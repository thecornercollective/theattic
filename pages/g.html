<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* main container */
        .main-container {
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* page content */
        .page {
            padding-left: 110px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* search section */
        .search-section {
            margin-bottom: 40px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 15px 50px 15px 25px;
            background: var(--input-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
        }

        /* search results popup */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .search-result-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-title {
            font-weight: 600;
            font-size: 1rem;
        }

        .search-result-category {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* category filters */
        .category-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 25px;
            background: var(--card-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        /* section title */
        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            padding-left: 10px;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }

        /* games grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            position: relative;
            aspect-ratio: 4/3;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .game-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            transform: translateY(20px);
            transition: all 0.4s ease;
            opacity: 0;
        }

        .game-card:hover .game-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .game-card-title {
            font-size: 1rem;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-tags {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .game-tag {
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* glow effect */
        .game-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3));
            border-radius: 22px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
                z-index: 200;
            }

            .page {
                padding-left: 20px;
                padding-right: 20px;
                padding-bottom: 100px;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }

            .category-filters {
                gap: 10px;
            }

            .filter-btn {
                padding: 8px 20px;
                font-size: 0.8rem;
            }

            .search-container {
                max-width: 100%;
            }

            .section-title {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding-left: 15px;
                padding-right: 15px;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }

            .game-card-title {
                font-size: 0.85rem;
            }

            .game-tag {
                font-size: 0.6rem;
                padding: 2px 6px;
            }

            .category-filters {
                gap: 8px;
            }

            .filter-btn {
                padding: 6px 15px;
                font-size: 0.75rem;
            }

            .search-input {
                padding: 12px 45px 12px 20px;
                font-size: 0.9rem;
            }

            .search-icon {
                font-size: 1rem;
            }

            .section-title {
                font-size: 1.3rem;
            }

            .sidebar {
                gap: 15px;
                padding: 15px 0;
            }

            .sidebar-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

        let currentCategory = 'all';

        // populate games grid
        function populateGames(category = 'all') {
            const grid = document.getElementById('gamesGrid');
            if (!grid) return;

            let filteredGames = games;
            if (category !== 'all') {
                filteredGames = games.filter(game => {
                    const gameCats = Array.isArray(game.category) ? game.category : [game.category];
                    return gameCats.includes(category);
                });
            }

            grid.innerHTML = filteredGames.map(game => `
                <a href="/theattic/play/${game.id}.html" class="game-card">
                    <img src="${game.img}" alt="${game.name}">
                    <div class="game-card-overlay">
                        <div class="game-card-title">${game.name}</div>
                        <div class="game-tags">
                            ${game.tags.slice(0, 2).map(tag => `<span class="game-tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // search functionality
        function handleSearch(query) {
            const resultsContainer = document.getElementById('searchResults');
            if (!resultsContainer) return;

            if (query.length < 2) {
                resultsContainer.classList.remove('show');
                return;
            }

            const results = games.filter(game => 
                game.name.toLowerCase().includes(query.toLowerCase())
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="search-result-item">No games found</div>';
            } else {
                resultsContainer.innerHTML = results.map(game => `
                    <a href="/theattic/play/${game.id}.html" class="search-result-item">
                        <img src="${game.img}" alt="${game.name}" class="search-result-img">
                        <div class="search-result-info">
                            <div class="search-result-title">${game.name}</div>
                            <div class="search-result-category">${Array.isArray(game.category) ? game.category[0] : game.category}</div>
                        </div>
                    </a>
                `).join('');
            }

            resultsContainer.classList.add('show');
        }

        // category filter functionality
        function setupCategoryFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    populateGames(currentCategory);
                });
            });
        }

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('atticTheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            localStorage.setItem('atticTheme', themeName);
        }

        // initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // search input event listener
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            handleSearch(e.target.value);
        });

        // close search results when clicking outside
        document.addEventListener('click', (e) => {
            const searchContainer = document.querySelector('.search-container');
            const searchResults = document.getElementById('searchResults');
            if (searchContainer && searchResults && !searchContainer.contains(e.target)) {
                searchResults.classList.remove('show');
            }
        });

        // initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            populateGames();
            setupCategoryFilters();
        });
    </script>
</body>
</html>
