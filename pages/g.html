<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* main container */
        .main-container {
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* page content */
        .page {
            padding-left: 110px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* search bar */
        .search-container {
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            background: var(--input-bg);
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(200, 200, 200, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* games grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 10px 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            position: relative;
            aspect-ratio: 1;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .game-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .game-card:hover .game-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .game-card-title {
            font-weight: 400;
            text-align: center;
            font-size: 1rem;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* glow effect on hover */
        .game-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3));
            border-radius: 22px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        /* search results popup */
        .search-results {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            max-height: 400px;
            overflow-y: auto;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .search-results.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .search-result-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .search-result-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }

        .search-result-item .info {
            flex: 1;
        }

        .search-result-item .name {
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .search-result-item .category {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .no-results {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
            }

            .page {
                padding-left: 20px;
                padding-bottom: 100px;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }

            .search-results {
                width: 95%;
                top: 70px;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="https://twentyfolds.github.io/veinte/home" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="/veinte/pages/g" class="sidebar-icon active" title="games">

            <a href="/veinte/pages/p" class="sidebar-icon" title="proxy">

            <a href="/veinte/pages/t" class="sidebar-icon" title="tools">

            <a href="/veinte/pages/s" class="sidebar-icon" title="settings">

        <!-- games page -->
        <div class="page">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="search games..." onkeyup="searchgames()">
            </div>
            
            <!-- Search results popup -->
            <div class="search-results" id="searchResults"></div>
            
            <div class="games-grid" id="gamesGrid">
                <!-- games populated by js -->
            </div>
        </div>
    </div>

    <script>

            { id: 'action6', name: 'ninja attack', img: 'https://via.placeholder.com/180x180/ffff00/ffffff?text=ninja+attack', category: 'action' },
            { id: 'action7', name: 'sniper elite', img: 'https://via.placeholder.com/180x180/ff6600/ffffff?text=sniper+elite', category: 'action' },

            { id: 'horror3', name: 'zombie apocalypse', img: 'https://via.placeholder.com/180x180/800000/ffffff?text=zombie+apocalypse', category: 'horror' },
            { id: 'horror4', name: 'ghost town', img: 'https://via.placeholder.com/180x180/990000/ffffff?text=ghost+town', category: 'horror' },
            { id: 'horror5', name: 'nightmare', img: 'https://via.placeholder.com/180x180/b30000/ffffff?text=nightmare', category: 'horror' },

            { id: 'horror7', name: 'evil clown', img: 'https://via.placeholder.com/180x180/800000/ffffff?text=evil+clown', category: 'horror' },
            { id: 'horror8', name: 'haunted forest', img: 'https://via.placeholder.com/180x180/660000/ffffff?text=haunted+forest', category: 'horror' },
            { id: 'running1', name: 'endless run', img: 'https://via.placeholder.com/180x180/00ff00/000000?text=endless+run', category: 'running' },
            { id: 'running2', name: 'temple dash', img: 'https://via.placeholder.com/180x180/00cc00/000000?text=temple+dash', category: 'running' },
            { id: 'running3', name: 'subway surf', img: 'https://via.placeholder.com/180x180/009900/000000?text=subway+surf', category: 'running' },
            { id: 'running4', name: 'parkour run', img: 'https://via.placeholder.com/180x180/006600/000000?text=parkour+run', category: 'running' },
            { id: 'running5', name: 'city runner', img: 'https://via.placeholder.com/180x180/003300/000000?text=city+runner', category: 'running' },
            { id: 'running6', name: 'sprint king', img: 'https://via.placeholder.com/180x180/001a00/000000?text=sprint+king', category: 'running' },
            { id: 'running7', name: 'road dash', img: 'https://via.placeholder.com/180x180/00cc00/000000?text=road+dash', category: 'running' },
            { id: 'running8', name: 'track stars', img: 'https://via.placeholder.com/180x180/009900/000000?text=track+stars', category: 'running' },
            { id: 'beauty1', name: 'makeup studio', img: 'https://via.placeholder.com/180x180/ff69b4/ffffff?text=makeup+studio', category: 'beauty' },
            { id: 'beauty2', name: 'dress up', img: 'https://via.placeholder.com/180x180/ff1493/ffffff?text=dress+up', category: 'beauty' },
            { id: 'beauty3', name: 'hair salon', img: 'https://via.placeholder.com/180x180/ff00ff/ffffff?text=hair+salon', category: 'beauty' },
            { id: 'beauty4', name: 'fashion queen', img: 'https://via.placeholder.com/180x180/da70d6/ffffff?text=fashion+queen', category: 'beauty' },
            { id: 'beauty5', name: 'nail art', img: 'https://via.placeholder.com/180x180/ba55d3/ffffff?text=nail+art', category: 'beauty' },
            { id: 'beauty6', name: 'spa day', img: 'https://via.placeholder.com/180x180/9932cc/ffffff?text=spa+day', category: 'beauty' },
            { id: 'beauty7', name: 'princess dress', img: 'https://via.placeholder.com/180x180/da70d6/ffffff?text=princess+dress', category: 'beauty' },
            { id: 'beauty8', name: 'jewelry maker', img: 'https://via.placeholder.com/180x180/ba55d3/ffffff?text=jewelry+maker', category: 'beauty' }
        ];

        // theme definitions with full color schemes
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000'
            },
            blue: {
                primaryBg: '#0f1624',
                secondaryBg: '#1a2332',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0f1624',
                gradientMiddle: '#1a2332',
                gradientEnd: '#162a4a'
            },
            pink: {
                primaryBg: '#1a0f14',
                secondaryBg: '#2d1a2e',
                cardBg: 'rgba(219, 112, 147, 0.15)',
                inputBg: 'rgba(219, 112, 147, 0.2)',
                gradientStart: '#1a0f14',
                gradientMiddle: '#2d1a2e',
                gradientEnd: '#3e1621'
            },
            green: {
                primaryBg: '#0f1a0f',
                secondaryBg: '#1a2e1a',
                cardBg: 'rgba(60, 179, 113, 0.15)',
                inputBg: 'rgba(60, 179, 113, 0.2)',
                gradientStart: '#0f1a0f',
                gradientMiddle: '#1a2e1a',
                gradientEnd: '#163e1c'
            },
            purple: {
                primaryBg: '#1a0f24',
                secondaryBg: '#2a1a2e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f24',
                gradientMiddle: '#2a1a2e',
                gradientEnd: '#3e1636'
            }
        };

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('veintetheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            // Update all CSS variables
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            // save theme to localStorage
            localStorage.setItem('veintetheme', themeName);
        }

        // populate games grid
        function populategames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = games.map(game => `
                <a href="play.html?game=${game.id}" class="game-card">
                    <img src="${game.img}" alt="${game.name}">
                    <div class="game-card-overlay">
                        <div class="game-card-title">${game.name}</div>
                    </div>
                </a>
            `).join('');
        }

        // search games with popup
        function searchgames() {
            const searchterm = document.getElementById('searchInput').value.toLowerCase().trim();
            const searchresults = document.getElementById('searchResults');

            if (searchterm === '') {
                searchresults.classList.remove('active');
                searchresults.innerHTML = '';
                return;
            }

            const filteredgames = games.filter(game => 
                game.name.toLowerCase().includes(searchterm)
            );

            if (filteredgames.length === 0) {
                searchresults.innerHTML = '<div class="no-results">no games found</div>';
            } else {
                searchresults.innerHTML = filteredgames.map(game => `
                    <a href="play.html?game=${game.id}" class="search-result-item">
                        <img src="${game.img}" alt="${game.name}">
                        <div class="info">
                            <div class="name">${game.name}</div>
                            <div class="category">${game.category}</div>
                        </div>
                    </a>
                `).join('');
            }

            searchresults.classList.add('active');
        }

        // close search results when clicking outside
        document.addEventListener('click', (e) => {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('active');
            }
        });

        // initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            populategames();
        });
    </script>
</body>
</html>
