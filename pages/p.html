<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - proxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 50%, var(--primary-bg) 100%);
            z-index: -2;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* proxy container */
        .proxy-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 110px 20px 110px;
        }

        .proxy-header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .proxy-title {
            font-size: 1.2rem;
            font-weight: 300;
            text-align: center;
            flex-grow: 1;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .proxy-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .proxy-tab {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-weight: 300;
        }

        .proxy-tab:hover, .proxy-tab.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab-close {
            font-size: 0.8rem;
            opacity: 0.6;
            cursor: pointer;
        }

        .tab-close:hover {
            opacity: 1;
        }

        .proxy-bookmarks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .bookmark-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .bookmark-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .bookmark-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .bookmark-name {
            font-weight: 300;
            font-size: 0.9rem;
        }

        /* extensions menu */
        .extensions-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            min-width: 350px;
            backdrop-filter: blur(20px);
            display: none;
        }

        .extensions-menu.active {
            display: block;
        }

        .extensions-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .extensions-menu-title {
            font-size: 1.3rem;
            font-weight: 300;
        }

        .extensions-menu-close {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0.6;
        }

        .extensions-menu-close:hover {
            opacity: 1;
        }

        .extension-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .extension-info h4 {
            font-weight: 300;
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .extension-info p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }

        .extension-toggle {
            width: 45px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .extension-toggle.active {
            background: #4CAF50;
        }

        .extension-toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s ease;
        }

        .extension-toggle.active::after {
            left: 23px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
            }

            .proxy-container {
                padding: 20px 20px 90px 20px;
            }

            .extensions-menu {
                min-width: 300px;
                padding: 20px;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- overlay -->
    <div class="overlay" id="overlay" onclick="closeextensions()"></div>

    <!-- extensions menu -->
    <div class="extensions-menu" id="extensionsMenu">
        <div class="extensions-menu-header">
            <h3 class="extensions-menu-title">veinte extensions</h3>
            <button class="extensions-menu-close" onclick="closeextensions()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="extension-card">
            <div class="extension-info">
                <h4>dark mode</h4>
                <p>enable dark mode on all websites</p>
            </div>
            <div class="extension-toggle" onclick="toggleextension(this)"></div>
        </div>
        <div class="extension-card">
            <div class="extension-info">
                <h4>ad blocker</h4>
                <p>block ads and trackers</p>
            </div>
            <div class="extension-toggle" onclick="toggleextension(this)"></div>
        </div>
        <div class="extension-card">
            <div class="extension-info">
                <h4>ai lens</h4>
                <p>coming soon</p>
            </div>
            <div class="extension-toggle" style="opacity: 0.5;"></div>
        </div>
        <div class="extension-card">
            <div class="extension-info">
                <h4>dev tools</h4>
                <p>access developer tools</p>
            </div>
            <div class="extension-toggle" onclick="toggleextension(this)"></div>
        </div>
    </div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="https://twentyfolds.github.io/veinte/home" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="/veinte/pages/g" class="sidebar-icon active" title="games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="/veinte/pages/p" class="sidebar-icon" title="proxy">
                <i class="fas fa-search"></i>
            </a>
            <a href="/veinte/pages/t" class="sidebar-icon" title="tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="/veinte/pages/s" class="sidebar-icon" title="settings">
                <i class="fas fa-cog"></i>
            </a>
        </nav>

        <!-- proxy page -->
        <div class="proxy-container">
            <div class="proxy-header">
                <button class="header-btn" onclick="addproxytab()">
                    <i class="fas fa-plus"></i>
                </button>
                <div class="proxy-title">veinte</div>
                <button class="header-btn" onclick="openextensions()">
                    <i class="fas fa-ellipsis-v"></i>
                </button>
            </div>
            
            <div class="proxy-tabs" id="proxyTabs">
                <div class="proxy-tab active">
                    <i class="fas fa-globe"></i> new tab <span class="tab-close"><i class="fas fa-times"></i></span>
                </div>
            </div>

            <div class="proxy-bookmarks">
                <div class="bookmark-item" onclick="openbookmark('https://www.tiktok.com')">
                    <div class="bookmark-icon"><i class="fab fa-tiktok"></i></div>
                    <div class="bookmark-name">tiktok</div>
                </div>
                <div class="bookmark-item" onclick="openbookmark('https://www.youtube.com')">
                    <div class="bookmark-icon"><i class="fab fa-youtube"></i></div>
                    <div class="bookmark-name">youtube</div>
                </div>
                <div class="bookmark-item" onclick="openbookmark('https://gemini.google.com')">
                    <div class="bookmark-icon"><i class="fas fa-robot"></i></div>
                    <div class="bookmark-name">gemini</div>
                </div>
                <div class="bookmark-item" onclick="openbookmark('https://chat.openai.com')">
                    <div class="bookmark-icon"><i class="fas fa-comments"></i></div>
                    <div class="bookmark-name">chatgpt</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localstorage.getitem('veintetheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(theme) {
            const root = document.documentelement;
            
            const themes = {
                default: {
                    primaryBg: '#000000',
                    secondaryBg: '#1a1a1a',
                    cardBg: 'rgba(255, 255, 255, 0.1)'
                },
                blue: {
                    primaryBg: '#1a1a2e',
                    secondaryBg: '#16213e',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                pink: {
                    primaryBg: '#2d1a2e',
                    secondaryBg: '#3e1621',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                green: {
                    primaryBg: '#1a2e1a',
                    secondaryBg: '#163e1c',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                brown: {
                    primaryBg: '#2e2a1a',
                    secondaryBg: '#3e3616',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                }
            };

            const selectedtheme = themes[theme];
            root.style.setproperty('--primary-bg', selectedtheme.primaryBg);
            root.style.setproperty('--secondary-bg', selectedtheme.secondaryBg);
            root.style.setproperty('--card-bg', selectedtheme.cardBg);
        }

        // proxy functions
        function addproxytab() {
            const tabscontainer = document.getelementbyid('proxytabs');
            const newtab = document.createelement('div');
            newtab.classname = 'proxy-tab';
            newtab.innerhtml = '<i class="fas fa-globe"></i> new tab <span class="tab-close"><i class="fas fa-times"></i></span>';
            newtab.queryselector('.tab-close').addeventlistener('click', (e) => {
                e.stoppropagation();
                newtab.remove();
            });
            tabscontainer.appendchild(newtab);
        }

        function openbookmark(url) {
            // in real implementation, this would open in the proxy iframe
        }

        // extensions menu
        function openextensions() {
            document.getelementbyid('extensionsmenu').classlist.add('active');
            document.getelementbyid('overlay').classlist.add('active');
        }

        function closeextensions() {
            document.getelementbyid('extensionsmenu').classlist.remove('active');
            document.getelementbyid('overlay').classlist.remove('active');
        }

        function toggleextension(toggle) {
            toggle.classlist.toggle('active');
        }

        // mouse shadow follower
        document.addeventlistener('mousemove', (e) => {
            const shadow = document.getelementbyid('mouseshadow');
            shadow.style.left = e.clientx + 'px';
            shadow.style.top = e.clienty + 'px';
        });

        // initialize on load
        window.addeventlistener('load', () => {
            applysavedtheme();
        });
    </script>
</body>
</html>
