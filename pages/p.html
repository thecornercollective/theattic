<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - browser</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twentyfolds/veinte@main/img/VeinteLogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background - black only */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* browser container */
        .browser-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-left: 110px;
            padding-top: 10px;
        }

        /* tab bar */
        .tab-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px 15px 0 0;
            margin-right: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--card-bg);
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            max-width: 250px;
            backdrop-filter: blur(10px);
            animation: tabSlide 0.3s ease;
        }

        @keyframes tabSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .tab-icon {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .tab-title {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 200;
        }

        .tab-close {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            opacity: 0.6;
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.2);
            opacity: 1;
        }

        .new-tab-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .new-tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* address bar */
        .address-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.08);
            margin-right: 20px;
            border-radius: 0;
        }

        .nav-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .address-bar {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: var(--input-bg);
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .address-bar:focus {
            background: rgba(200, 200, 200, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .address-bar::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* browser content */
        .browser-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            margin-right: 20px;
            border-radius: 0 0 15px 15px;
            overflow: hidden;
            height: calc(100vh - 140px);
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            border-radius: 0 0 15px 15px;
        }

        /* new tab page - simplified design */
        .new-tab-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: white;
            padding: 40px;
            width: 100%;
            height: 100%;
        }

        .new-tab-title {
            font-size: 5rem;
            font-weight: 200;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .new-tab-subtitle {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 40px;
            font-weight: 200;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .quick-link {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .quick-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .quick-link-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .quick-link-title {
            font-size: 0.9rem;
            font-weight: 200;
        }

        /* loading indicator */
        .loading-bar {
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-bar.active {
            animation: loading 1.5s ease-in-out;
        }

        @keyframes loading {
            0% {
                width: 0%;
                opacity: 1;
            }
            50% {
                width: 70%;
                opacity: 1;
            }
            100% {
                width: 100%;
                opacity: 0;
            }
        }

        /* proxy status indicator */
        .proxy-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .proxy-status.online {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .proxy-status.offline {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .proxy-status.loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        /* context menu */
        .context-menu {
            position: fixed;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 5px 0;
            min-width: 180px;
            z-index: 10000;
            display: none;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .context-menu.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .context-menu-item {
            padding: 10px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s ease;
            font-size: 0.9rem;
        }

        .context-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .context-menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 5px 0;
        }

        .context-menu-icon {
            width: 16px;
            text-align: center;
            opacity: 0.7;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
            }

            .browser-container {
                padding-left: 20px;
                padding-bottom: 90px;
            }

            .tab-bar {
                padding: 8px 10px;
            }

            .tab {
                padding: 8px 15px;
                min-width: 120px;
            }

            .quick-links {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux@0.1.2/dist/index.mjs" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@1.2.2/scramjet.all.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- proxy status indicator -->
    <div class="proxy-status loading" id="proxyStatus">
        <i class="fas fa-spinner fa-spin"></i> Initializing proxy...
    </div>

    <!-- context menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" onclick="navigateBack()">
            <span class="context-menu-icon"><i class="fas fa-arrow-left"></i></span>
            Back
        </div>
        <div class="context-menu-item" onclick="navigateForward()">
            <span class="context-menu-icon"><i class="fas fa-arrow-right"></i></span>
            Forward
        </div>
        <div class="context-menu-item" onclick="refreshPage()">
            <span class="context-menu-icon"><i class="fas fa-redo"></i></span>
            Refresh
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="copyUrl()">
            <span class="context-menu-icon"><i class="fas fa-copy"></i></span>
            Copy URL
        </div>
        <div class="context-menu-item" onclick="pasteUrl()">
            <span class="context-menu-icon"><i class="fas fa-paste"></i></span>
            Paste URL
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="openInNewTab()">
            <span class="context-menu-icon"><i class="fas fa-plus"></i></span>
            Open in New Tab
        </div>
        <div class="context-menu-item" onclick="duplicateTab()">
            <span class="context-menu-icon"><i class="fas fa-clone"></i></span>
            Duplicate Tab
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item" onclick="bookmarkPage()">
            <span class="context-menu-icon"><i class="fas fa-bookmark"></i></span>
            Bookmark
        </div>
        <div class="context-menu-item" onclick="toggleFullScreen()">
            <span class="context-menu-icon"><i class="fas fa-expand"></i></span>
            Full Screen
        </div>
    </div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="home.html" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="g.html" class="sidebar-icon" title="games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="p.html" class="sidebar-icon active" title="browser">
                <i class="fas fa-globe"></i>
            </a>
            <a href="t.html" class="sidebar-icon" title="tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="s.html" class="sidebar-icon" title="settings">
                <i class="fas fa-cog"></i>
            </a>
        </nav>

        <!-- browser container -->
        <div class="browser-container">
            <!-- tab bar -->
            <div class="tab-bar" id="tabBar">
                <!-- tabs will be added here dynamically -->
            </div>

            <!-- address bar -->
            <div class="address-bar-container">
                <button class="nav-btn" id="backBtn" onclick="goBack()" title="Back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="nav-btn" id="forwardBtn" onclick="goForward()" title="Forward">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button class="nav-btn" id="refreshBtn" onclick="refreshPage()" title="Refresh">
                    <i class="fas fa-redo"></i>
                </button>
                <input type="text" class="address-bar" id="addressBar" placeholder="Search or enter URL" onkeypress="handleAddressBar(event)">
                <button class="search-btn" onclick="navigateToUrl()" title="Go">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <!-- loading bar -->
            <div class="loading-bar" id="loadingBar"></div>

            <!-- browser content -->
            <div class="browser-content">
                <div class="iframe-container" id="iframeContainer">
                    <!-- iframe or new tab page will be shown here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== THEME CHANGER ====================
        // theme definitions with full color schemes
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000'
            },
            blue: {
                primaryBg: '#0f1624',
                secondaryBg: '#1a2332',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0f1624',
                gradientMiddle: '#1a2332',
                gradientEnd: '#162a4a'
            },
            pink: {
                primaryBg: '#1a0f14',
                secondaryBg: '#2d1a2e',
                cardBg: 'rgba(219, 112, 147, 0.15)',
                inputBg: 'rgba(219, 112, 147, 0.2)',
                gradientStart: '#1a0f14',
                gradientMiddle: '#2d1a2e',
                gradientEnd: '#3e1621'
            },
            green: {
                primaryBg: '#0f1a0f',
                secondaryBg: '#1a2e1a',
                cardBg: 'rgba(60, 179, 113, 0.15)',
                inputBg: 'rgba(60, 179, 113, 0.2)',
                gradientStart: '#0f1a0f',
                gradientMiddle: '#1a2e1a',
                gradientEnd: '#163e1c'
            },
            purple: {
                primaryBg: '#1a0f24',
                secondaryBg: '#2a1a2e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f24',
                gradientMiddle: '#2a1a2e',
                gradientEnd: '#3e1636'
            }
        };

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('veintetheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            // Update all CSS variables
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            // save theme to localStorage
            localStorage.setItem('veintetheme', themeName);
        }

        // ==================== BROWSER FUNCTIONALITY WITH SCRAMJET ====================
        
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;
        let scramjetInstance = null;
        let scramjetController = null;

        // Update proxy status indicator
        function updateProxyStatus(status, message) {
            const statusEl = document.getElementById('proxyStatus');
            if (!statusEl) return;
            
            statusEl.className = `proxy-status ${status}`;
            
            const icon = status === 'online' ? 'fa-check-circle' : 
                        status === 'offline' ? 'fa-times-circle' : 
                        'fa-spinner fa-spin';
            
            statusEl.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
        }

        // Initialize Scramjet
        async function initScramjet() {
            updateProxyStatus('loading', 'Initializing proxy...');
            
            try {
                // Load Scramjet Controller
                const { ScramjetController } = $scramjetLoadController();
                scramjetController = new ScramjetController({
                    files: {
                        wasm: "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@1.2.2/scramjet.wasm.wasm",
                        all: "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@1.2.2/scramjet.all.js",
                        sync: "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@1.2.2/scramjet.sync.js",
                    },
                    flags: {
                        rewriterLogs: false,
                        scramitize: false,
                        cleanErrors: true,
                        sourcemaps: true,
                    },
                });

                // Initialize Scramjet
                await scramjetController.init();
                updateProxyStatus('loading', 'Registering service worker...');
                
                // Register service worker
                if ('serviceWorker' in navigator) {
                    try {
                        await navigator.serviceWorker.register('./sw.js');
                        console.log('Service Worker registered successfully');
                    } catch (swError) {
                        console.warn('Service Worker registration failed:', swError);
                        updateProxyStatus('offline', 'Service worker failed');
                    }
                }

                // Setup transport
                try {
                    updateProxyStatus('loading', 'Configuring transport...');
                    const connection = new BareMux.BareMuxConnection("https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux@0.1.2/dist/worker.js");
                    await connection.setTransport(
                        "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@0.0.15/dist/index.mjs",
                        [{ wisp: "wss://wisp.mercurywork.shop/" }]
                    );
                    console.log('Transport configured successfully');
                } catch (transportError) {
                    console.warn('Transport setup failed:', transportError);
                    updateProxyStatus('offline', 'Transport failed');
                }

                console.log('Scramjet initialized successfully');
                updateProxyStatus('online', 'Proxy connected');
                
                // Auto-hide status after 3 seconds if successful
                setTimeout(() => {
                    const statusEl = document.getElementById('proxyStatus');
                    if (statusEl && statusEl.classList.contains('online')) {
                        statusEl.style.opacity = '0';
                        setTimeout(() => {
                            if (statusEl) {
                                statusEl.style.display = 'none';
                            }
                        }, 300);
                    }
                }, 3000);
                
                return scramjetController;
            } catch (error) {
                console.error('Scramjet initialization failed:', error);
                updateProxyStatus('offline', 'Proxy failed');
                return null;
            }
        }

        // Create a new Scramjet frame for a tab
        function createScramjetFrame() {
            if (!scramjetController) {
                console.error('Scramjet controller not initialized');
                return null;
            }
            
            const frame = scramjetController.createFrame();
            frame.frame.style.width = '100%';
            frame.frame.style.height = '100%';
            frame.frame.style.border = 'none';
            frame.frame.style.background = 'white';
            frame.frame.style.borderRadius = '0 0 15px 15px';
            
            // Listen for URL changes from within the iframe
            frame.addEventListener('urlchange', (e) => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab && e.url) {
                    tab.url = e.url;
                    tab.title = getDomainName(e.url);
                    renderTabs();
                    updateAddressBar();
                }
            });
            
            // Listen for frame events
            frame.frame.addEventListener('load', () => {
                hideLoading();
                updateNavButtons();
            });
            
            return frame;
        }

        // Initialize browser
        async function initBrowser() {
            scramjetController = await initScramjet();
            
            // Setup network monitoring
            setupNetworkMonitoring();
            
            // Try to restore saved tabs
            restoreTabs();
            
            // Create new tab if no tabs were restored
            if (tabs.length === 0) {
                createNewTab();
            }
            
            // Setup auto-save
            setupAutoSave();
            
            // Load saved search engine preference
            const savedEngine = localStorage.getItem('veinte_search_engine');
            if (savedEngine && searchEngines[savedEngine]) {
                currentSearchEngine = savedEngine;
            }
            
            // Load saved zoom level
            const savedZoom = localStorage.getItem('veinte_zoom_level');
            if (savedZoom) {
                zoomLevel = parseInt(savedZoom, 10);
            }
        }

        // Create new tab - Fixed to properly create new tabs
        function createNewTab(url = null) {
            const tabId = ++tabCounter;
            const tab = {
                id: tabId,
                title: 'New Tab',
                url: url || null,
                history: [],
                historyIndex: -1,
                frame: null
            };
            
            tabs.push(tab);
            switchToTab(tabId);
        }

        // Render tabs
        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            
            tabs.forEach(tab => {
                const tabElement = document.createElement('div');
                tabElement.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabElement.onclick = () => switchToTab(tab.id);
                tabElement.innerHTML = `
                    <span class="tab-icon"><i class="fas fa-globe"></i></span>
                    <span class="tab-title">${tab.title}</span>
                    <span class="tab-close" onclick="event.stopPropagation(); closeTab(${tab.id})">
                        <i class="fas fa-times"></i>
                    </span>
                `;
                tabBar.appendChild(tabElement);
            });
            
            // Add new tab button
            const newTabBtn = document.createElement('button');
            newTabBtn.className = 'new-tab-btn';
            newTabBtn.onclick = () => createNewTab();
            newTabBtn.innerHTML = '<i class="fas fa-plus"></i>';
            tabBar.appendChild(newTabBtn);
        }

        // Switch to tab
        function switchToTab(tabId) {
            activeTabId = tabId;
            renderTabs();
            updateBrowserContent();
        }

        // Close tab
        function closeTab(tabId) {
            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;
            
            // Clean up frame if exists
            const tab = tabs[tabIndex];
            if (tab.frame && tab.frame.frame) {
                tab.frame.frame.remove();
            }
            
            tabs.splice(tabIndex, 1);
            
            if (tabs.length === 0) {
                createNewTab();
            } else if (activeTabId === tabId) {
                // Switch to the last tab if the active tab was closed
                const newIndex = Math.min(tabIndex, tabs.length - 1);
                activeTabId = tabs[newIndex].id;
                renderTabs();
                updateBrowserContent();
            } else {
                renderTabs();
            }
        }

        // Update browser content
        function updateBrowserContent() {
            const tab = tabs.find(t => t.id === activeTabId);
            const container = document.getElementById('iframeContainer');
            const addressBar = document.getElementById('addressBar');
            
            if (!tab) return;
            
            if (!tab.url || tab.url === null) {
                // Show new tab page - simplified design with just "veinte" and icons
                container.innerHTML = `
                    <div class="new-tab-page">
                        <h1 class="new-tab-title">veinte</h1>
                        
                        <div class="quick-links">
                            <div class="quick-link" onclick="navigateTo('https://www.tiktok.com')">
                                <div class="quick-link-icon"><i class="fab fa-tiktok"></i></div>
                                <div class="quick-link-title">TikTok</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://chatgpt.com')">
                                <div class="quick-link-icon"><i class="fas fa-robot"></i></div>
                                <div class="quick-link-title">ChatGPT</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://www.youtube.com')">
                                <div class="quick-link-icon"><i class="fab fa-youtube"></i></div>
                                <div class="quick-link-title">YouTube</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://twitter.com')">
                                <div class="quick-link-icon"><i class="fab fa-twitter"></i></div>
                                <div class="quick-link-title">Twitter</div>
                            </div>
                        </div>
                    </div>
                `;
                addressBar.value = '';
            } else {
                // Show iframe with Scramjet
                if (!tab.frame) {
                    tab.frame = createScramjetFrame();
                }
                
                if (tab.frame) {
                    container.innerHTML = '';
                    container.appendChild(tab.frame.frame);
                    tab.frame.go(tab.url);
                }
                
                addressBar.value = tab.url;
            }
            
            updateNavButtons();
        }

        // Navigate to URL
        function navigateTo(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            // Ensure url is a string
            if (typeof url !== 'string') {
                url = String(url);
            }
            
            // Get safe URL
            url = getSafeUrl(url);
            
            // Validate URL
            if (!isValidUrl(url)) {
                showError('Invalid URL. Please enter a valid web address.');
                return;
            }
            
            // Update tab data
            tab.url = url;
            tab.title = getDomainName(url);
            
            // Add to history
            if (tab.historyIndex < tab.history.length - 1) {
                tab.history = tab.history.slice(0, tab.historyIndex + 1);
            }
            tab.history.push(url);
            tab.historyIndex = tab.history.length - 1;
            
            renderTabs();
            updateBrowserContent();
            showLoading();
        }

        // Get domain name from URL
        function getDomainName(url) {
            try {
                if (!url || typeof url !== 'string') {
                    return 'Page';
                }
                const urlObj = new URL(url);
                return urlObj.hostname.replace('www.', '');
            } catch {
                return 'Page';
            }
        }

        // Handle address bar input
        function handleAddressBar(event) {
            if (event.key === 'Enter') {
                navigateToUrl();
            }
        }

        // Navigate to URL from address bar
        function navigateToUrl() {
            const addressBar = document.getElementById('addressBar');
            const url = addressBar.value.trim();
            
            if (url) {
                navigateTo(url);
                // Blur the address bar after navigation
                addressBar.blur();
            }
        }

        // Copy current URL to clipboard
        async function copyUrl() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.url) {
                try {
                    await navigator.clipboard.writeText(tab.url);
                    console.log('URL copied to clipboard');
                } catch (err) {
                    console.error('Failed to copy URL:', err);
                }
            }
        }

        // Paste URL from clipboard
        async function pasteUrl() {
            try {
                const url = await navigator.clipboard.readText();
                const addressBar = document.getElementById('addressBar');
                addressBar.value = url;
                addressBar.focus();
            } catch (err) {
                console.error('Failed to paste URL:', err);
            }
        }

        // Save current page to bookmarks (localStorage)
        function saveBookmark() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || !tab.url) return;
            
            let bookmarks = JSON.parse(localStorage.getItem('veinte_bookmarks') || '[]');
            
            const bookmark = {
                id: Date.now(),
                url: tab.url,
                title: tab.title,
                date: new Date().toISOString()
            };
            
            // Check if already bookmarked
            const exists = bookmarks.find(b => b.url === tab.url);
            if (!exists) {
                bookmarks.push(bookmark);
                localStorage.setItem('veinte_bookmarks', JSON.stringify(bookmarks));
                console.log('Bookmark saved');
            }
        }

        // Load bookmarks from localStorage
        function loadBookmarks() {
            return JSON.parse(localStorage.getItem('veinte_bookmarks') || '[]');
        }

        // Get browsing history
        function getBrowsingHistory() {
            const tab = tabs.find(t => t.id === activeTabId);
            return tab ? tab.history : [];
        }

        // Clear browsing history for current tab
        function clearTabHistory() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            tab.history = [tab.url].filter(Boolean);
            tab.historyIndex = tab.history.length - 1;
            updateNavButtons();
        }

        // Get tab statistics
        function getTabStats() {
            return {
                totalTabs: tabs.length,
                activeTabId: activeTabId,
                currentUrl: tabs.find(t => t.id === activeTabId)?.url,
                historyLength: tabs.find(t => t.id === activeTabId)?.history.length || 0
            };
        }

        // Search engines configuration
        const searchEngines = {
            google: 'https://www.google.com/search?q=',
            duckduckgo: 'https://duckduckgo.com/?q=',
            bing: 'https://www.bing.com/search?q=',
            yahoo: 'https://search.yahoo.com/search?p='
        };

        let currentSearchEngine = 'google';

        // Set search engine
        function setSearchEngine(engine) {
            if (searchEngines[engine]) {
                currentSearchEngine = engine;
                localStorage.setItem('veinte_search_engine', engine);
            }
        }

        // Get current search engine
        function getSearchEngine() {
            return localStorage.getItem('veinte_search_engine') || currentSearchEngine;
        }

        // Perform search
        function performSearch(query) {
            const engine = getSearchEngine();
            const searchUrl = searchEngines[engine] + encodeURIComponent(query);
            navigateTo(searchUrl);
        }

        // Update safe URL function to use custom search engine
        function getSafeUrl(input) {
            let url = input.trim();
            
            // Check if it's a search query
            if (!url.includes('.') && !url.startsWith('http')) {
                return searchEngines[getSearchEngine()] + encodeURIComponent(url);
            }
            
            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            return url;
        }

        // Handle URL encoding
        function encodeUrl(url) {
            try {
                return encodeURIComponent(url);
            } catch (e) {
                return url;
            }
        }

        // Handle URL decoding
        function decodeUrl(encodedUrl) {
            try {
                return decodeURIComponent(encodedUrl);
            } catch (e) {
                return encodedUrl;
            }
        }

        // Get URL parameters
        function getUrlParameters(url) {
            try {
                const urlObj = new URL(url);
                const params = {};
                urlObj.searchParams.forEach((value, key) => {
                    params[key] = value;
                });
                return params;
            } catch (e) {
                return {};
            }
        }

        // Check if URL is using HTTPS
        function isSecureUrl(url) {
            try {
                return new URL(url).protocol === 'https:';
            } catch (e) {
                return false;
            }
        }

        // Get domain from URL
        function getDomain(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.hostname;
            } catch (e) {
                return '';
            }
        }

        // Check if URL is same as current tab
        function isCurrentUrl(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            return tab && tab.url === url;
        }

        // Reload all tabs
        function reloadAllTabs() {
            tabs.forEach(tab => {
                if (tab.frame && tab.url) {
                    tab.frame.reload();
                }
            });
        }

        // Close all tabs except current
        function closeOtherTabs() {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if (!currentTab) return;
            
            tabs.forEach(tab => {
                if (tab.id !== activeTabId && tab.frame && tab.frame.frame) {
                    tab.frame.frame.remove();
                }
            });
            
            tabs = [currentTab];
            renderTabs();
        }

        // Close tabs to the right
        function closeTabsToRight() {
            const currentIndex = tabs.findIndex(t => t.id === activeTabId);
            if (currentIndex === -1) return;
            
            const tabsToClose = tabs.slice(currentIndex + 1);
            tabsToClose.forEach(tab => {
                if (tab.frame && tab.frame.frame) {
                    tab.frame.frame.remove();
                }
            });
            
            tabs = tabs.slice(0, currentIndex + 1);
            renderTabs();
        }

        // Close tabs to the left
        function closeTabsToLeft() {
            const currentIndex = tabs.findIndex(t => t.id === activeTabId);
            if (currentIndex <= 0) return;
            
            const tabsToClose = tabs.slice(0, currentIndex);
            tabsToClose.forEach(tab => {
                if (tab.frame && tab.frame.frame) {
                    tab.frame.frame.remove();
                }
            });
            
            tabs = tabs.slice(currentIndex);
            renderTabs();
        }

        // Export tabs data
        function exportTabs() {
            const tabsData = tabs.map(tab => ({
                id: tab.id,
                title: tab.title,
                url: tab.url,
                history: tab.history
            }));
            
            const dataStr = JSON.stringify(tabsData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = 'veinte-tabs.json';
            link.click();
            
            URL.revokeObjectURL(url);
        }

        // Import tabs data
        function importTabs(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const tabsData = JSON.parse(e.target.result);
                    tabsData.forEach(tabData => {
                        const tab = {
                            id: ++tabCounter,
                            title: tabData.title || 'Imported Tab',
                            url: tabData.url || null,
                            history: tabData.history || [],
                            historyIndex: tabData.history ? tabData.history.length - 1 : -1,
                            frame: null
                        };
                        tabs.push(tab);
                    });
                    renderTabs();
                    console.log('Tabs imported successfully');
                } catch (err) {
                    console.error('Failed to import tabs:', err);
                }
            };
            reader.readAsText(file);
        }

        // Auto-save tabs to localStorage
        function autoSaveTabs() {
            const tabsData = tabs.map(tab => ({
                title: tab.title,
                url: tab.url,
                history: tab.history,
                historyIndex: tab.historyIndex
            }));
            localStorage.setItem('veinte_saved_tabs', JSON.stringify(tabsData));
        }

        // Restore tabs from localStorage
        function restoreTabs() {
            try {
                const savedTabs = JSON.parse(localStorage.getItem('veinte_saved_tabs') || '[]');
                if (savedTabs.length > 0) {
                    tabs = [];
                    savedTabs.forEach((tabData, index) => {
                        const tab = {
                            id: ++tabCounter,
                            title: tabData.title || 'Restored Tab',
                            url: tabData.url || null,
                            history: tabData.history || [],
                            historyIndex: tabData.historyIndex || -1,
                            frame: null
                        };
                        tabs.push(tab);
                    });
                    
                    // Set first tab as active
                    if (tabs.length > 0) {
                        activeTabId = tabs[0].id;
                    }
                    
                    renderTabs();
                    console.log('Tabs restored successfully');
                }
            } catch (err) {
                console.error('Failed to restore tabs:', err);
            }
        }

        // Monitor tab changes for auto-save
        function setupAutoSave() {
            // Save tabs every 30 seconds
            setInterval(autoSaveTabs, 30000);
            
            // Save tabs before page unload
            window.addEventListener('beforeunload', autoSaveTabs);
        }

        // Get favicon URL for a domain
        function getFaviconUrl(url) {
            try {
                const domain = getDomain(url);
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            } catch (e) {
                return '';
            }
        }

        // Open in external browser
        function openInExternalBrowser(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            const targetUrl = url || tab?.url;
            if (targetUrl) {
                window.open(targetUrl, '_blank');
            }
        }

        // Print current page
        function printPage() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab?.frame?.frame) {
                try {
                    tab.frame.frame.contentWindow.print();
                } catch (e) {
                    console.error('Failed to print:', e);
                }
            }
        }

        // Zoom functions
        let zoomLevel = 100;

        function zoomIn() {
            if (zoomLevel < 200) {
                zoomLevel += 10;
                applyZoom();
                saveZoomLevel();
            }
        }

        function zoomOut() {
            if (zoomLevel > 50) {
                zoomLevel -= 10;
                applyZoom();
                saveZoomLevel();
            }
        }

        function resetZoom() {
            zoomLevel = 100;
            applyZoom();
            saveZoomLevel();
        }

        function saveZoomLevel() {
            localStorage.setItem('veinte_zoom_level', zoomLevel.toString());
        }

        function applyZoom() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab?.frame?.frame) {
                tab.frame.frame.style.transform = `scale(${zoomLevel / 100})`;
                tab.frame.frame.style.transformOrigin = 'top left';
            }
        }

        // Context menu functions
        function showContextMenu(x, y) {
            const contextMenu = document.getElementById('contextMenu');
            contextMenu.style.left = x + 'px';
            contextMenu.style.top = y + 'px';
            contextMenu.classList.add('active');
        }

        function hideContextMenu() {
            const contextMenu = document.getElementById('contextMenu');
            contextMenu.classList.remove('active');
        }

        function navigateBack() {
            goBack();
            hideContextMenu();
        }

        function navigateForward() {
            goForward();
            hideContextMenu();
        }

        function openInNewTab() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab?.url) {
                createNewTab(tab.url);
            }
            hideContextMenu();
        }

        function bookmarkPage() {
            saveBookmark();
            hideContextMenu();
        }

        // Handle context menu on right-click
        document.addEventListener('contextmenu', (e) => {
            // Don't show context menu on input fields or iframes
            const target = e.target;
            const isInput = target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable;
            const isIframe = target.tagName === 'IFRAME';
            
            // Show custom context menu unless right-clicking on iframe content
            if (!isInput && !isIframe) {
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY);
            }
        });

        // Hide context menu when clicking elsewhere
        document.addEventListener('click', (e) => {
            const contextMenu = document.getElementById('contextMenu');
            if (!contextMenu.contains(e.target)) {
                hideContextMenu();
            }
        });

        // Handle escape key to close context menu
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideContextMenu();
            }
        });

        // Error recovery for proxy failures
        function handleProxyError(error) {
            console.error('Proxy error:', error);
            showError('Connection failed. Please check your internet connection and try again.');
        }

        // Network status monitoring
        function setupNetworkMonitoring() {
            window.addEventListener('online', () => {
                updateProxyStatus('online', 'Back online');
                setTimeout(() => {
                    const statusEl = document.getElementById('proxyStatus');
                    if (statusEl) {
                        statusEl.style.opacity = '0';
                    }
                }, 2000);
            });

            window.addEventListener('offline', () => {
                updateProxyStatus('offline', 'Offline');
                const statusEl = document.getElementById('proxyStatus');
                if (statusEl) {
                    statusEl.style.opacity = '1';
                }
            });
        }

        // Get user agent
        function getUserAgent() {
            return navigator.userAgent;
        }

        // Check mobile device
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(getUserAgent());
        }

        // Get device info
        function getDeviceInfo() {
            return {
                userAgent: getUserAgent(),
                isMobile: isMobileDevice(),
                platform: navigator.platform,
                language: navigator.language,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                viewportWidth: window.innerWidth,
                viewportHeight: window.innerHeight
            };
        }

        // Format date
        function formatDate(date) {
            return new Date(date).toLocaleString();
        }

        // Time since last visit
        function getTimeSince(date) {
            const now = new Date();
            const past = new Date(date);
            const diff = now - past;
            
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            
            if (days > 0) return `${days} day${days > 1 ? 's' : ''} ago`;
            if (hours > 0) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
            if (minutes > 0) return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
            return 'Just now';
        }

        // Get page info
        function getPageInfo() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return null;
            
            return {
                url: tab.url,
                title: tab.title,
                domain: getDomain(tab.url),
                favicon: getFaviconUrl(tab.url),
                secure: isSecureUrl(tab.url),
                historyLength: tab.history.length,
                historyIndex: tab.historyIndex
            };
        }

        // Console helper for debugging
        const veinteConsole = {
            log: (...args) => console.log('[Veinte]', ...args),
            error: (...args) => console.error('[Veinte]', ...args),
            warn: (...args) => console.warn('[Veinte]', ...args),
            info: (...args) => console.info('[Veinte]', ...args),
            
            tabs: () => console.table(tabs),
            activeTab: () => console.log(getPageInfo()),
            stats: () => console.log(getTabStats()),
            device: () => console.log(getDeviceInfo())
        };

        // Expose Veinte API for external use
        window.Veinte = {
            navigate: navigateTo,
            createTab: createNewTab,
            closeTab: closeTab,
            getTabs: () => tabs,
            getActiveTab: () => tabs.find(t => t.id === activeTabId),
            getHistory: getBrowsingHistory,
            getBookmarks: loadBookmarks,
            getSettings: () => ({
                theme: localStorage.getItem('veintetheme'),
                searchEngine: getSearchEngine(),
                zoom: zoomLevel
            }),
            console: veinteConsole
        };

        console.log('Veinte API loaded. Access via window.Veinte');

        // Go back
        function goBack() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || tab.historyIndex <= 0) return;
            
            tab.historyIndex--;
            tab.url = tab.history[tab.historyIndex];
            tab.title = getDomainName(tab.url);
            
            renderTabs();
            updateBrowserContent();
            showLoading();
            
            // Use Scramjet's back method if available
            if (tab.frame && tab.frame.back) {
                setTimeout(() => tab.frame.back(), 100);
            }
        }

        // Go forward
        function goForward() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || tab.historyIndex >= tab.history.length - 1) return;
            
            tab.historyIndex++;
            tab.url = tab.history[tab.historyIndex];
            tab.title = getDomainName(tab.url);
            
            renderTabs();
            updateBrowserContent();
            showLoading();
            
            // Use Scramjet's forward method if available
            if (tab.frame && tab.frame.forward) {
                setTimeout(() => tab.frame.forward(), 100);
            }
        }

        // Refresh page
        function refreshPage() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || !tab.url) return;
            
            if (tab.frame) {
                tab.frame.reload();
            }
            showLoading();
        }

        // Toggle full-screen mode
        function toggleFullScreen() {
            const container = document.getElementById('iframeContainer');
            const browserContent = document.querySelector('.browser-content');
            
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                } else if (container.msRequestFullscreen) {
                    container.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Focus address bar
        function focusAddressBar() {
            document.getElementById('addressBar').focus();
            document.getElementById('addressBar').select();
        }

        // Get page title from iframe
        function getPageTitle() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.frame && tab.frame.frame) {
                try {
                    return tab.frame.frame.contentDocument?.title || tab.title;
                } catch (e) {
                    return tab.title;
                }
            }
            return tab?.title || 'New Tab';
        }

        // Update navigation buttons
        function updateNavButtons() {
            const tab = tabs.find(t => t.id === activeTabId);
            const backBtn = document.getElementById('backBtn');
            const forwardBtn = document.getElementById('forwardBtn');
            
            backBtn.disabled = !tab || tab.historyIndex <= 0;
            forwardBtn.disabled = !tab || tab.historyIndex >= tab.history.length - 1;
        }

        // Show loading animation
        function showLoading() {
            const loadingBar = document.getElementById('loadingBar');
            loadingBar.classList.add('active');
        }

        // Hide loading animation
        function hideLoading() {
            const loadingBar = document.getElementById('loadingBar');
            loadingBar.classList.remove('active');
        }

        // Update address bar value
        function updateAddressBar() {
            const tab = tabs.find(t => t.id === activeTabId);
            const addressBar = document.getElementById('addressBar');
            
            if (tab && tab.url) {
                addressBar.value = tab.url;
            } else {
                addressBar.value = '';
            }
        }

        // Clear browser cache and cookies for a tab
        async function clearTabData(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab) return;
            
            // Remove the frame to clear data
            if (tab.frame && tab.frame.frame) {
                tab.frame.frame.remove();
                tab.frame = null;
            }
            
            // Recreate frame if URL exists
            if (tab.url) {
                tab.frame = createScramjetFrame();
                const container = document.getElementById('iframeContainer');
                container.innerHTML = '';
                container.appendChild(tab.frame.frame);
                tab.frame.go(tab.url);
            }
        }

        // Open URL in new tab
        function openInNewTab(url) {
            createNewTab(url);
        }

        // Duplicate current tab
        function duplicateTab() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.url) {
                createNewTab(tab.url);
            }
        }

        // Validate URL format
        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        // Get safe URL (adds protocol if missing)
        function getSafeUrl(input) {
            let url = input.trim();
            
            // Check if it's a search query
            if (!url.includes('.') && !url.startsWith('http')) {
                return `https://www.google.com/search?q=${encodeURIComponent(url)}`;
            }
            
            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            return url;
        }

        // Show error message
        function showError(message) {
            const container = document.getElementById('iframeContainer');
            container.innerHTML = `
                <div class="new-tab-page">
                    <h1 class="new-tab-title" style="color: #ff6b6b;">Error</h1>
                    <p style="opacity: 0.8; margin-bottom: 30px;">${message}</p>
                    <button onclick="navigateTo('https://www.google.com')" 
                            style="padding: 15px 30px; background: rgba(255,255,255,0.1); 
                                   border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; 
                                   color: white; cursor: pointer; font-family: 'Poppins', sans-serif;">
                        Go to Google
                    </button>
                </div>
            `;
        }

        // Initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // Mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Check if user is typing in input fields
            const activeElement = document.activeElement;
            const isInputFocused = activeElement.tagName === 'INPUT' || 
                                  activeElement.tagName === 'TEXTAREA' ||
                                  activeElement.isContentEditable;
            
            // Skip shortcuts if input is focused (except for escape)
            if (isInputFocused && e.key !== 'Escape') {
                return;
            }
            
            // Ctrl/Cmd + T: New tab
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                createNewTab();
            }
            
            // Ctrl/Cmd + W: Close tab
            if ((e.ctrlKey || e.metaKey) && e.key === 'w') {
                e.preventDefault();
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    closeTab(tab.id);
                }
            }
            
            // Ctrl/Cmd + L: Focus address bar
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                focusAddressBar();
            }
            
            // Ctrl/Cmd + R: Refresh
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                refreshPage();
            }
            
            // Alt + Left Arrow: Back
            if (e.altKey && e.key === 'ArrowLeft') {
                e.preventDefault();
                goBack();
            }
            
            // Alt + Right Arrow: Forward
            if (e.altKey && e.key === 'ArrowRight') {
                e.preventDefault();
                goForward();
            }
            
            // F11: Full screen
            if (e.key === 'F11') {
                e.preventDefault();
                toggleFullScreen();
            }
            
            // Escape: Focus address bar when not in input
            if (e.key === 'Escape' && !isInputFocused) {
                focusAddressBar();
            }
        });

        // Handle fullscreen change
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab && tab.url) {
                    updateBrowserContent();
                }
            }
        });

        // Handle visibility change (pause animations when tab not visible)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // Page is hidden - could pause heavy operations
            } else {
                // Page is visible again
                updateAddressBar();
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            initBrowser();
        });
    </script>
</body>
</html>
