<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Attic | Browser</title>
    <link rel="icon" type="image/png" href="/img/TheAtticIcon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 110px 20px 110px;
            gap: 15px;
            height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* browser container */
        .browser-container {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* tabs bar */
        .tabs-bar {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 10px;
            min-width: 150px;
            max-width: 200px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.2);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .tab-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .tab-title {
            flex: 1;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-close {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .new-tab-btn {
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .new-tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* browser toolbar */
        .browser-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.2);
        }

        .toolbar-btn {
            width: 35px;
            height: 35px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .toolbar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .url-bar {
            flex: 1;
            padding: 10px 20px;
            background: var(--input-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .url-bar:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* browser content */
        .browser-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .browser-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* new tab page */
        .new-tab-page {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--primary-bg);
        }

        .new-tab-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .new-tab-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .new-tab-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            max-width: 500px;
            width: 100%;
        }

        .quick-link {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
        }

        .quick-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .quick-link-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .quick-link-title {
            font-size: 0.8rem;
            font-weight: 500;
        }

        /* tab animations */
        .tab {
            animation: tabSlideIn 0.3s ease;
        }

        @keyframes tabSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tab.closing {
            animation: tabSlideOut 0.3s ease forwards;
        }

        @keyframes tabSlideOut {
            to {
                opacity: 0;
                transform: translateX(-20px);
                width: 0;
                padding: 0;
                margin: 0;
            }
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
                z-index: 200;
            }

            .main-container {
                padding: 10px 10px 90px 10px;
                gap: 10px;
            }

            .tab {
                min-width: 120px;
                max-width: 150px;
                padding: 8px 12px;
            }

            .tab-title {
                font-size: 0.75rem;
            }

            .browser-toolbar {
                flex-wrap: wrap;
            }

            .url-bar {
                order: 3;
                width: 100%;
                margin-top: 5px;
            }

            .new-tab-title {
                font-size: 1.5rem;
            }

            .quick-links {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 10px;
            }

            .quick-link {
                padding: 12px;
            }

            .quick-link-icon {
                font-size: 1.2rem;
            }

            .quick-link-title {
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .tab {
                min-width: 100px;
                max-width: 120px;
            }

            .toolbar-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }

            .new-tab-logo {
                width: 80px;
                height: 80px;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="/theattic/home.html" class="sidebar-icon" title="Home">
                <i class="fas fa-home"></i>
            </a>
            <a href="/theattic/pages/g.html" class="sidebar-icon" title="Games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="/theattic/pages/p.html" class="sidebar-icon active" title="Proxy">
                <i class="fas fa-search"></i>
            </a>
            <a href="/theattic/pages/t.html" class="sidebar-icon" title="Tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="/theattic/pages/s.html" class="sidebar-icon" title="Settings">
                <i class="fas fa-cog"></i>
            </a>
            <a href="/theattic/pages/c.html" class="sidebar-icon" title="Chat">
                <i class="fas fa-comments"></i>
            </a>
            <a href="/theattic/pages/notifications.html" class="sidebar-icon" title="Notifications">
                <i class="fas fa-bell"></i>
            </a>
            <a href="/theattic/pages/profile.html" class="sidebar-icon" title="Profile">
                <i class="fas fa-user"></i>
            </a>
        </nav>

        <!-- browser container -->
        <div class="browser-container">
            <!-- tabs bar -->
            <div class="tabs-bar" id="tabsBar">
                <button class="new-tab-btn" id="newTabBtn" title="New Tab">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <!-- browser toolbar -->
            <div class="browser-toolbar">
                <button class="toolbar-btn" id="backBtn" title="Go Back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="toolbar-btn" id="forwardBtn" title="Go Forward">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button class="toolbar-btn" id="refreshBtn" title="Refresh">
                    <i class="fas fa-redo"></i>
                </button>
                <button class="toolbar-btn" id="homeBtn" title="Home">
                    <i class="fas fa-home"></i>
                </button>
                <input type="text" class="url-bar" id="urlBar" placeholder="Search or enter URL...">
            </div>

            <!-- browser content -->
            <div class="browser-content" id="browserContent">
                <!-- tabs and iframes will be managed by JS -->
            </div>
        </div>
    </div>

    <script>
        // Scramjet proxy configuration
        const scramjetConfig = {
            server: 'https://scramjet-proxy-server.example.com', // Replace with actual Scramjet server
            prefix: '/proxy/'
        };

        // Tab management
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;

        // Theme definitions
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000'
            },
            midnightBlue: {
                primaryBg: '#0a1628',
                secondaryBg: '#1a2a4a',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0a1628',
                gradientMiddle: '#1a2a4a',
                gradientEnd: '#0f2847'
            },
            hotPink: {
                primaryBg: '#2a0f1a',
                secondaryBg: '#3d1a2e',
                cardBg: 'rgba(255, 105, 180, 0.15)',
                inputBg: 'rgba(255, 105, 180, 0.2)',
                gradientStart: '#2a0f1a',
                gradientMiddle: '#3d1a2e',
                gradientEnd: '#4a1636'
            },
            galaxyPurple: {
                primaryBg: '#1a0f2a',
                secondaryBg: '#2a1a3e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f2a',
                gradientMiddle: '#2a1a3e',
                gradientEnd: '#3e1650'
            },
            icedCoffeeBrown: {
                primaryBg: '#1a1510',
                secondaryBg: '#2a2520',
                cardBg: 'rgba(210, 180, 140, 0.15)',
                inputBg: 'rgba(210, 180, 140, 0.2)',
                gradientStart: '#1a1510',
                gradientMiddle: '#2a2520',
                gradientEnd: '#3a3028'
            },
            matchaGreen: {
                primaryBg: '#0f1a10',
                secondaryBg: '#1a2a1e',
                cardBg: 'rgba(128, 200, 128, 0.15)',
                inputBg: 'rgba(128, 200, 128, 0.2)',
                gradientStart: '#0f1a10',
                gradientMiddle: '#1a2a1e',
                gradientEnd: '#1e3a28'
            }
        };

        // Create new tab
        function createTab(url = null) {
            const tabId = ++tabCounter;
            const tab = {
                id: tabId,
                title: 'New Tab',
                url: url,
                favicon: '/img/TheAtticIcon.png'
            };
            
            tabs.push(tab);
            renderTabs();
            switchTab(tabId);
            
            if (url) {
                navigateTo(url);
            }
        }

        // Close tab
        function closeTab(tabId, event) {
            if (event) {
                event.stopPropagation();
            }
            
            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;
            
            // Animate tab closing
            const tabElement = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
            if (tabElement) {
                tabElement.classList.add('closing');
                setTimeout(() => {
                    tabs = tabs.filter(t => t.id !== tabId);
                    
                    // Remove iframe
                    const iframe = document.getElementById(`iframe-${tabId}`);
                    if (iframe) {
                        iframe.remove();
                    }
                    
                    // If closing active tab, switch to another
                    if (activeTabId === tabId) {
                        if (tabs.length > 0) {
                            const newIndex = Math.min(tabIndex, tabs.length - 1);
                            switchTab(tabs[newIndex].id);
                        } else {
                            activeTabId = null;
                            createTab();
                        }
                    }
                    
                    renderTabs();
                }, 300);
            }
        }

        // Switch to tab
        function switchTab(tabId) {
            activeTabId = tabId;
            
            // Update tab UI
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            const activeTabElement = document.querySelector(`.tab[data-tab-id="${tabId}"]`);
            if (activeTabElement) {
                activeTabElement.classList.add('active');
            }
            
            // Show/hide iframes
            document.querySelectorAll('.browser-frame').forEach(iframe => {
                iframe.style.display = 'none';
            });
            const activeIframe = document.getElementById(`iframe-${tabId}`);
            if (activeIframe) {
                activeIframe.style.display = 'block';
            }
            
            // Update URL bar
            const tab = tabs.find(t => t.id === tabId);
            if (tab && tab.url) {
                document.getElementById('urlBar').value = tab.url;
            } else {
                document.getElementById('urlBar').value = '';
            }
        }

        // Render tabs
        function renderTabs() {
            const tabsBar = document.getElementById('tabsBar');
            const newTabBtn = document.getElementById('newTabBtn');
            
            // Remove existing tabs (keep new tab button)
            tabsBar.querySelectorAll('.tab').forEach(tab => tab.remove());
            
            // Add tabs before new tab button
            tabs.forEach(tab => {
                const tabElement = document.createElement('div');
                tabElement.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabElement.dataset.tabId = tab.id;
                tabElement.innerHTML = `
                    <img src="${tab.favicon}" alt="" class="tab-icon">
                    <span class="tab-title">${tab.title}</span>
                    <div class="tab-close" onclick="closeTab(${tab.id}, event)">
                        <i class="fas fa-times"></i>
                    </div>
                `;
                tabElement.addEventListener('click', () => switchTab(tab.id));
                tabsBar.insertBefore(tabElement, newTabBtn);
            });
        }

        // Navigate to URL
        function navigateTo(url) {
            if (!url) return;
            
            // Add protocol if missing
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            tab.url = url;
            
            // Update URL bar
            document.getElementById('urlBar').value = url;
            
            // Create or update iframe with Scramjet proxy
            let iframe = document.getElementById(`iframe-${tab.id}`);
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = `iframe-${tab.id}`;
                iframe.className = 'browser-frame';
                iframe.style.display = 'none';
                document.getElementById('browserContent').appendChild(iframe);
            }
            
            // Use Scramjet proxy
            const proxiedUrl = scramjetConfig.server + scramjetConfig.prefix + url;
            iframe.src = proxiedUrl;
            iframe.style.display = 'block';
            
            // Update tab title
            tab.title = new URL(url).hostname;
            renderTabs();
        }

        // Quick link functionality
        function setupQuickLinks() {
            const quickLinks = [
                { url: 'https://www.google.com', icon: 'fab fa-google', title: 'Google' },
                { url: 'https://www.youtube.com', icon: 'fab fa-youtube', title: 'YouTube' },
                { url: 'https://www.twitter.com', icon: 'fab fa-twitter', title: 'Twitter' },
                { url: 'https://www.reddit.com', icon: 'fab fa-reddit', title: 'Reddit' },
                { url: 'https://www.github.com', icon: 'fab fa-github', title: 'GitHub' },
                { url: 'https://www.discord.com', icon: 'fab fa-discord', title: 'Discord' }
            ];
            
            const newTabPage = document.querySelector('.new-tab-page');
            if (newTabPage) {
                const quickLinksContainer = newTabPage.querySelector('.quick-links');
                if (quickLinksContainer) {
                    quickLinksContainer.innerHTML = quickLinks.map(link => `
                        <a href="#" class="quick-link" data-url="${link.url}">
                            <i class="${link.icon} quick-link-icon"></i>
                            <div class="quick-link-title">${link.title}</div>
                        </a>
                    `).join('');
                    
                    quickLinksContainer.querySelectorAll('.quick-link').forEach(link => {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            navigateTo(link.dataset.url);
                        });
                    });
                }
            }
        }

        // Show new tab page
        function showNewTabPage() {
            const browserContent = document.getElementById('browserContent');
            
            // Hide all iframes
            document.querySelectorAll('.browser-frame').forEach(iframe => {
                iframe.style.display = 'none';
            });
            
            // Create or show new tab page
            let newTabPage = document.querySelector('.new-tab-page');
            if (!newTabPage) {
                newTabPage = document.createElement('div');
                newTabPage.className = 'new-tab-page';
                newTabPage.innerHTML = `
                    <img src="/img/TheAtticLogo.png" alt="The Attic Logo" class="new-tab-logo">
                    <h1 class="new-tab-title">The Attic Browser</h1>
                    <p class="new-tab-subtitle">Your private browsing experience</p>
                    <div class="quick-links"></div>
                `;
                browserContent.appendChild(newTabPage);
                setupQuickLinks();
            }
            
            newTabPage.style.display = 'flex';
        }

        // Apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('atticTheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            localStorage.setItem('atticTheme', themeName);
        }

        // Initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // Mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // Event listeners
        document.getElementById('newTabBtn')?.addEventListener('click', () => {
            createTab();
            showNewTabPage();
        });

        document.getElementById('urlBar')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                navigateTo(e.target.value);
            }
        });

        document.getElementById('backBtn')?.addEventListener('click', () => {
            const iframe = document.getElementById(`iframe-${activeTabId}`);
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.history.back();
            }
        });

        document.getElementById('forwardBtn')?.addEventListener('click', () => {
            const iframe = document.getElementById(`iframe-${activeTabId}`);
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.history.forward();
            }
        });

        document.getElementById('refreshBtn')?.addEventListener('click', () => {
            const iframe = document.getElementById(`iframe-${activeTabId}`);
            if (iframe) {
                iframe.src = iframe.src;
            }
        });

        document.getElementById('homeBtn')?.addEventListener('click', () => {
            showNewTabPage();
        });

        // Initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            createTab();
            showNewTabPage();
        });
    </script>
</body>
</html>
