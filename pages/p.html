<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - browser</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background - black only */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* browser container */
        .browser-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-left: 110px;
            padding-top: 10px;
        }

        /* tab bar */
        .tab-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px 15px 0 0;
            margin-right: 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--card-bg);
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
            max-width: 250px;
            backdrop-filter: blur(10px);
            animation: tabSlide 0.3s ease;
        }

        @keyframes tabSlide {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.15);
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .tab-icon {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .tab-title {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 200;
        }

        .tab-close {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            opacity: 0.6;
            transition: all 0.2s ease;
        }

        .tab-close:hover {
            background: rgba(255, 255, 255, 0.2);
            opacity: 1;
        }

        .new-tab-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .new-tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* address bar */
        .address-bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.08);
            margin-right: 20px;
            border-radius: 0;
        }

        .nav-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .address-bar {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: var(--input-bg);
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 200;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .address-bar:focus {
            background: rgba(200, 200, 200, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .address-bar::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* browser content */
        .browser-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            margin-right: 20px;
            border-radius: 0 0 15px 15px;
            overflow: hidden;
            height: calc(100vh - 140px);
        }

        .iframe-container {
            flex: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* new tab page - simplified design */
        .new-tab-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: white;
            padding: 40px;
            width: 100%;
            height: 100%;
        }

        .new-tab-title {
            font-size: 5rem;
            font-weight: 200;
            margin-bottom: 50px;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .new-tab-subtitle {
            font-size: 1rem;
            opacity: 0.6;
            margin-bottom: 40px;
            font-weight: 200;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }

        .quick-link {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .quick-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .quick-link-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .quick-link-title {
            font-size: 0.9rem;
            font-weight: 200;
        }

        /* loading indicator */
        .loading-bar {
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .loading-bar.active {
            animation: loading 1.5s ease-in-out;
        }

        @keyframes loading {
            0% {
                width: 0%;
                opacity: 1;
            }
            50% {
                width: 70%;
                opacity: 1;
            }
            100% {
                width: 100%;
                opacity: 0;
            }
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
            }

            .browser-container {
                padding-left: 20px;
                padding-bottom: 90px;
            }

            .tab-bar {
                padding: 8px 10px;
            }

            .tab {
                padding: 8px 15px;
                min-width: 120px;
            }

            .quick-links {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="home.html" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="g.html" class="sidebar-icon" title="games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="p.html" class="sidebar-icon active" title="browser">
                <i class="fas fa-globe"></i>
            </a>
            <a href="t.html" class="sidebar-icon" title="tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="s.html" class="sidebar-icon" title="settings">
                <i class="fas fa-cog"></i>
            </a>
        </nav>

        <!-- browser container -->
        <div class="browser-container">
            <!-- tab bar -->
            <div class="tab-bar" id="tabBar">
                <!-- tabs will be added here dynamically -->
            </div>

            <!-- address bar -->
            <div class="address-bar-container">
                <button class="nav-btn" id="backBtn" onclick="goBack()" title="Back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button class="nav-btn" id="forwardBtn" onclick="goForward()" title="Forward">
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button class="nav-btn" id="refreshBtn" onclick="refreshPage()" title="Refresh">
                    <i class="fas fa-redo"></i>
                </button>
                <input type="text" class="address-bar" id="addressBar" placeholder="Search or enter URL" onkeypress="handleAddressBar(event)">
                <button class="search-btn" onclick="navigateToUrl()" title="Go">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>

            <!-- loading bar -->
            <div class="loading-bar" id="loadingBar"></div>

            <!-- browser content -->
            <div class="browser-content">
                <div class="iframe-container" id="iframeContainer">
                    <!-- iframe or new tab page will be shown here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== BROWSER FUNCTIONALITY ====================
        
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;

        // Get current origin for proxy
        const currentOrigin = window.location.origin;
        const PROXY_BASE = `${currentOrigin}/proxy/`;

        // Initialize browser
        function initBrowser() {
            createNewTab();
        }

        // Create new tab - Fixed to properly create new tabs
        function createNewTab(url = null) {
            const tabId = ++tabCounter;
            const tab = {
                id: tabId,
                title: 'New Tab',
                url: url || null,
                history: [],
                historyIndex: -1
            };
            
            tabs.push(tab);
            switchToTab(tabId);
        }

        // Render tabs
        function renderTabs() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = '';
            
            tabs.forEach(tab => {
                const tabElement = document.createElement('div');
                tabElement.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
                tabElement.onclick = () => switchToTab(tab.id);
                tabElement.innerHTML = `
                    <span class="tab-icon"><i class="fas fa-globe"></i></span>
                    <span class="tab-title">${tab.title}</span>
                    <span class="tab-close" onclick="event.stopPropagation(); closeTab(${tab.id})">
                        <i class="fas fa-times"></i>
                    </span>
                `;
                tabBar.appendChild(tabElement);
            });
            
            // Add new tab button
            const newTabBtn = document.createElement('button');
            newTabBtn.className = 'new-tab-btn';
            newTabBtn.onclick = () => createNewTab();
            newTabBtn.innerHTML = '<i class="fas fa-plus"></i>';
            tabBar.appendChild(newTabBtn);
        }

        // Switch to tab
        function switchToTab(tabId) {
            activeTabId = tabId;
            renderTabs();
            updateBrowserContent();
        }

        // Close tab
        function closeTab(tabId) {
            const tabIndex = tabs.findIndex(t => t.id === tabId);
            if (tabIndex === -1) return;
            
            tabs.splice(tabIndex, 1);
            
            if (tabs.length === 0) {
                createNewTab();
            } else if (activeTabId === tabId) {
                // Switch to the last tab if the active tab was closed
                const newIndex = Math.min(tabIndex, tabs.length - 1);
                activeTabId = tabs[newIndex].id;
                renderTabs();
                updateBrowserContent();
            } else {
                renderTabs();
            }
        }

        // Update browser content
        function updateBrowserContent() {
            const tab = tabs.find(t => t.id === activeTabId);
            const container = document.getElementById('iframeContainer');
            const addressBar = document.getElementById('addressBar');
            
            if (!tab) return;
            
            if (!tab.url || tab.url === null) {
                // Show new tab page - simplified design with just "veinte" and icons
                container.innerHTML = `
                    <div class="new-tab-page">
                        <h1 class="new-tab-title">veinte</h1>
                        
                        <div class="quick-links">
                            <div class="quick-link" onclick="navigateTo('https://www.tiktok.com')">
                                <div class="quick-link-icon"><i class="fab fa-tiktok"></i></div>
                                <div class="quick-link-title">TikTok</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://chatgpt.com')">
                                <div class="quick-link-icon"><i class="fas fa-robot"></i></div>
                                <div class="quick-link-title">ChatGPT</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://www.youtube.com')">
                                <div class="quick-link-icon"><i class="fab fa-youtube"></i></div>
                                <div class="quick-link-title">YouTube</div>
                            </div>
                            <div class="quick-link" onclick="navigateTo('https://twitter.com')">
                                <div class="quick-link-icon"><i class="fab fa-twitter"></i></div>
                                <div class="quick-link-title">Twitter</div>
                            </div>
                        </div>
                    </div>
                `;
                addressBar.value = '';
            } else {
                // Show iframe with proxy - set background to transparent
                const proxyUrl = getProxyUrl(tab.url);
                container.innerHTML = `<iframe src="${proxyUrl}" id="browserFrame" style="background: transparent;"></iframe>`;
                addressBar.value = tab.url;
            }
            
            updateNavButtons();
        }

        // Get proxy URL - Using local proxy
        function getProxyUrl(url) {
            // Ensure url is a string and not null/undefined
            if (!url || typeof url !== 'string') {
                return '';
            }
            
            // Remove protocol for proxy
            let cleanUrl = url;
            if (url.startsWith('http://')) {
                cleanUrl = url.substring(7);
            } else if (url.startsWith('https://')) {
                cleanUrl = url.substring(8);
            }
            
            // Use local proxy
            return `${PROXY_BASE}${cleanUrl}`;
        }

        // Navigate to URL
        function navigateTo(url) {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab) return;
            
            // Ensure url is a string
            if (typeof url !== 'string') {
                url = String(url);
            }
            
            // Check if it's a search query
            if (!url.includes('.') && !url.startsWith('http')) {
                url = `https://www.google.com/search?q=${encodeURIComponent(url)}`;
            }
            
            // Make sure URL has protocol
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            tab.url = url;
            tab.title = getDomainName(url);
            
            // Add to history
            if (tab.historyIndex < tab.history.length - 1) {
                tab.history = tab.history.slice(0, tab.historyIndex + 1);
            }
            tab.history.push(url);
            tab.historyIndex = tab.history.length - 1;
            
            renderTabs();
            updateBrowserContent();
            showLoading();
        }

        // Get domain name from URL
        function getDomainName(url) {
            try {
                if (!url || typeof url !== 'string') {
                    return 'Page';
                }
                const urlObj = new URL(url);
                return urlObj.hostname.replace('www.', '');
            } catch {
                return 'Page';
            }
        }

        // Handle address bar input
        function handleAddressBar(event) {
            if (event.key === 'Enter') {
                navigateToUrl();
            }
        }

        // Navigate to URL from address bar
        function navigateToUrl() {
            const addressBar = document.getElementById('addressBar');
            const url = addressBar.value.trim();
            
            if (url) {
                navigateTo(url);
            }
        }

        // Go back
        function goBack() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || tab.historyIndex <= 0) return;
            
            tab.historyIndex--;
            tab.url = tab.history[tab.historyIndex];
            tab.title = getDomainName(tab.url);
            
            renderTabs();
            updateBrowserContent();
            showLoading();
        }

        // Go forward
        function goForward() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || tab.historyIndex >= tab.history.length - 1) return;
            
            tab.historyIndex++;
            tab.url = tab.history[tab.historyIndex];
            tab.title = getDomainName(tab.url);
            
            renderTabs();
            updateBrowserContent();
            showLoading();
        }

        // Refresh page
        function refreshPage() {
            const tab = tabs.find(t => t.id === activeTabId);
            if (!tab || !tab.url) return;
            
            updateBrowserContent();
            showLoading();
        }

        // Update navigation buttons
        function updateNavButtons() {
            const tab = tabs.find(t => t.id === activeTabId);
            const backBtn = document.getElementById('backBtn');
            const forwardBtn = document.getElementById('forwardBtn');
            
            backBtn.disabled = !tab || tab.historyIndex <= 0;
            forwardBtn.disabled = !tab || tab.historyIndex >= tab.history.length - 1;
        }

        // Show loading animation
        function showLoading() {
            const loadingBar = document.getElementById('loadingBar');
            loadingBar.classList.add('active');
            
            setTimeout(() => {
                loadingBar.classList.remove('active');
            }, 1500);
        }

        // Initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // Mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            createparticles();
            initBrowser();
        });
    </script>
</body>
</html>
