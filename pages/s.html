<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - settings</title>
    <link rel="icon" type="image/png" href="https://cdn.jsdelivr.net/gh/twentyfolds/veinte@main/img/VeinteLogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link id="favicon" rel="icon" href="" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* page content */
        .page {
            padding-left: 110px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* settings container */
        .settings-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .settings-category {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: background 0.5s ease;
        }

        .settings-title {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .settings-description {
            margin-bottom: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        /* theme options */
        .theme-options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .theme-btn {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .theme-btn:hover, .theme-btn.active {
            border-color: white;
            transform: scale(1.1);
        }

        .theme-default {
            background: linear-gradient(135deg, #000000, #1a1a1a);
        }

        .theme-blue {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }

        .theme-pink {
            background: linear-gradient(135deg, #2d1a2e, #3e1621);
        }

        .theme-green {
            background: linear-gradient(135deg, #1a2e1a, #163e1c);
        }

        .theme-purple {
            background: linear-gradient(135deg, #2a1a2e, #3e1636);
        }

        /* tab cloaker form */
        .tab-cloaker-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tab-cloaker-form input, .tab-cloaker-form select {
            padding: 12px;
            border-radius: 15px;
            border: none;
            background: var(--input-bg);
            color: white;
            outline: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        .tab-cloaker-form select option {
            background: #1a1a1a;
            color: white;
        }

        .tab-cloaker-form button {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        .tab-cloaker-form button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
            }

            .page {
                padding-left: 20px;
                padding-bottom: 100px;
            }

            .settings-container {
                max-width: 100%;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="https://twentyfolds.github.io/veinte/home" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="/veinte/pages/g" class="sidebar-icon active" title="games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="/veinte/pages/p" class="sidebar-icon" title="proxy">
                <i class="fas fa-search"></i>
            </a>
            <a href="/veinte/pages/t" class="sidebar-icon" title="tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="/veinte/pages/s" class="sidebar-icon" title="settings">
                <i class="fas fa-cog"></i>
            </a>
        </nav>

        <!-- settings page -->
        <div class="page">
            <div class="settings-container">
                <div class="settings-category">
                    <h2 class="settings-title">theme</h2>
                    <p class="settings-description">choose your preferred theme</p>
                    <div class="theme-options">
                        <div class="theme-btn theme-default active" data-theme="default" title="default"></div>
                        <div class="theme-btn theme-blue" data-theme="blue" title="blue"></div>
                        <div class="theme-btn theme-pink" data-theme="pink" title="pink"></div>
                        <div class="theme-btn theme-green" data-theme="green" title="green"></div>
                        <div class="theme-btn theme-purple" data-theme="purple" title="purple"></div>
                    </div>
                </div>

                <div class="settings-category">
                    <h2 class="settings-title">tab cloaker</h2>
                    <p class="settings-description">change the tab title and icon to match school sites</p>
                    <div class="tab-cloaker-form">
                        <input type="text" id="tabTitle" placeholder="tab title">
                        <input type="text" id="tabIcon" placeholder="tab icon url">
                        <select id="presetCloaks">
                            <option value="">-- select preset --</option>
                            <option value="google">google classroom</option>
                            <option value="ixl">ixl</option>
                            <option value="deltamath">deltamath</option>
                            <option value="canvas">canvas</option>
                            <option value="schoology">schoology</option>
                        </select>
                        <button onclick="applytabcloak()">apply cloak</button>
                        <button onclick="resettabcloak()">reset cloak</button>
                    </div>
                </div>

                <div class="settings-category">
                    <h2 class="settings-title">about</h2>
                    <p class="settings-description">veinte is a clean, modern gaming and utility platform.</p>
                </div>

                <div class="settings-category">
                    <h2 class="settings-title">credits</h2>
                    <p class="settings-description">created with ❤️ by the veinte team</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // theme definitions with full color schemes
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000'
            },
            blue: {
                primaryBg: '#0f1624',
                secondaryBg: '#1a2332',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0f1624',
                gradientMiddle: '#1a2332',
                gradientEnd: '#162a4a'
            },
            pink: {
                primaryBg: '#1a0f14',
                secondaryBg: '#2d1a2e',
                cardBg: 'rgba(219, 112, 147, 0.15)',
                inputBg: 'rgba(219, 112, 147, 0.2)',
                gradientStart: '#1a0f14',
                gradientMiddle: '#2d1a2e',
                gradientEnd: '#3e1621'
            },
            green: {
                primaryBg: '#0f1a0f',
                secondaryBg: '#1a2e1a',
                cardBg: 'rgba(60, 179, 113, 0.15)',
                inputBg: 'rgba(60, 179, 113, 0.2)',
                gradientStart: '#0f1a0f',
                gradientMiddle: '#1a2e1a',
                gradientEnd: '#163e1c'
            },
            purple: {
                primaryBg: '#1a0f24',
                secondaryBg: '#2a1a2e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f24',
                gradientMiddle: '#2a1a2e',
                gradientEnd: '#3e1636'
            }
        };

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('veintetheme');
            if (savedtheme) {
                applytheme(savedtheme);
                // update active theme button
                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                const activeBtn = document.querySelector(`[data-theme="${savedtheme}"]`);
                if (activeBtn) {
                    activeBtn.classList.add('active');
                }
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            // Update all CSS variables
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            // save theme to localStorage
            localStorage.setItem('veintetheme', themeName);
        }

        // theme button click handlers
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const theme = btn.dataset.theme;
                applytheme(theme);
            });
        });

        // initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // tab cloaker presets
        document.getElementById('presetCloaks').addEventListener('change', (e) => {
            const presets = {
                google: { title: 'Google Classroom', icon: 'https://ssl.gstatic.com/classroom/favicon.png' },
                ixl: { title: 'IXL | Math, Language Arts, Science, Social Studies, and Spanish', icon: 'https://www.ixl.com/favicon.ico' },
                deltamath: { title: 'DeltaMath', icon: 'https://www.deltamath.com/favicon.ico' },
                canvas: { title: 'Canvas', icon: 'https://du11hjcvx0uq9.cloudfront.net/dist/images/favicon-e10d657c73.ico' },
                schoology: { title: 'Home | Schoology', icon: 'https://asset.schoology.com/sites/all/themes/schoology_theme/images/favicon.ico' }
            };

            const preset = presets[e.target.value];
            if (preset) {
                document.getElementById('tabTitle').value = preset.title;
                document.getElementById('tabIcon').value = preset.icon;
            }
        });

        function applytabcloak() {
            const title = document.getElementById('tabTitle').value;
            const icon = document.getElementById('tabIcon').value;
            
            if (title) {
                document.title = title;
            }
            
            if (icon) {
                const favicon = document.getElementById('favicon');
                if (favicon) {
                    favicon.href = icon;
                }
            }
        }

        function resettabcloak() {
            document.title = 'veinte - settings';
            const favicon = document.getElementById('favicon');
            if (favicon) {
                favicon.href = '';
            }
            document.getElementById('tabTitle').value = '';
            document.getElementById('tabIcon').value = '';
            document.getElementById('presetCloaks').value = '';
        }

        // mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
        });
    </script>
</body>
</html>
