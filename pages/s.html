<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Attic | Settings</title>
    <link rel="icon" type="image/png" href="/img/TheAtticIcon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .main-container {
            min-height: 100vh;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* page content */
        .page {
            padding-left: 110px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* settings sections */
        .settings-section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* theme selector */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .theme-btn {
            height: 80px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .theme-btn:hover {
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .theme-btn.active {
            border-color: white;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .theme-btn::after {
            content: attr(data-name);
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
        }

        /* tab cloaker */
        .cloaker-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
        }

        .form-input {
            padding: 12px 20px;
            background: var(--input-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .form-select {
            padding: 12px 20px;
            background: var(--input-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .form-select option {
            background: var(--secondary-bg);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* about section */
        .about-content {
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.8);
        }

        .about-content p {
            margin-bottom: 15px;
        }

        .about-content strong {
            color: white;
            font-weight: 600;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
                z-index: 200;
            }

            .page {
                padding-left: 20px;
                padding-right: 20px;
                padding-bottom: 100px;
            }

            .theme-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .btn-group {
                flex-direction: column;
            }

            .settings-section {
                padding: 20px;
            }

            .section-title {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding-left: 15px;
                padding-right: 15px;
            }

            .settings-section {
                padding: 15px;
            }

            .theme-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 15px;
            }

            .theme-btn {
                height: 60px;
            }

            .theme-btn::after {
                font-size: 0.7rem;
            }

            .form-input, .form-select {
                padding: 10px 15px;
                font-size: 0.9rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .section-title {
                font-size: 1.2rem;
            }

            .sidebar {
                gap: 15px;
                padding: 15px 0;
            }

            .sidebar-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="particles" id="particles"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="main-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="/theattic/home.html" class="sidebar-icon" title="Home">
                <i class="fas fa-home"></i>
            </a>
            <a href="/theattic/pages/g.html" class="sidebar-icon" title="Games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="/theattic/pages/p.html" class="sidebar-icon" title="Proxy">
                <i class="fas fa-search"></i>
            </a>
            <a href="/theattic/pages/t.html" class="sidebar-icon" title="Tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="/theattic/pages/s.html" class="sidebar-icon active" title="Settings">
                <i class="fas fa-cog"></i>
            </a>
            <a href="/theattic/pages/notifications.html" class="sidebar-icon" title="Notifications">
                <i class="fas fa-bell"></i>
            </a>
            <a href="/theattic/pages/profile.html" class="sidebar-icon" title="Profile">
                <i class="fas fa-user"></i>
            </a>
        </nav>

        <!-- settings page -->
        <div class="page">
            <!-- theme section -->
            <div class="settings-section">
                <h2 class="section-title">Theme</h2>
                <div class="theme-grid" id="themeGrid">
                    <!-- themes populated by js -->
                </div>
            </div>

            <!-- tab cloaker section -->
            <div class="settings-section">
                <h2 class="section-title">Tab Cloaker</h2>
                <div class="cloaker-form">
                    <div class="form-group">
                        <label class="form-label">Preset</label>
                        <select class="form-select" id="presetSelect">
                            <option value="">Select a preset...</option>
                            <option value="google-classroom">Google Classroom</option>
                            <option value="ixl">IXL</option>
                            <option value="deltamath">DeltaMath</option>
                            <option value="canvas">Canvas</option>
                            <option value="schoology">Schoology</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Custom Title</label>
                        <input type="text" class="form-input" id="customTitle" placeholder="Enter custom title...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Custom Icon URL</label>
                        <input type="text" class="form-input" id="customIcon" placeholder="Enter custom icon URL...">
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary" id="applyCloak">Apply</button>
                        <button class="btn btn-secondary" id="resetCloak">Reset</button>
                    </div>
                </div>
            </div>

            <!-- about section -->
            <div class="settings-section">
                <h2 class="section-title">About</h2>
                <div class="about-content">
                    <p><strong>The Attic</strong> is your cozy hangout for games, apps, and good vibes.</p>
                    <p>Built with love by <strong>Corner Collective</strong>.</p>
                    <p>Version 1.0.0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // theme definitions
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000',
                displayGradient: 'linear-gradient(135deg, #000000, #1a1a1a)'
            },
            midnightBlue: {
                primaryBg: '#0a1628',
                secondaryBg: '#1a2a4a',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0a1628',
                gradientMiddle: '#1a2a4a',
                gradientEnd: '#0f2847',
                displayGradient: 'linear-gradient(135deg, #0a1628, #1a2a4a)'
            },
            hotPink: {
                primaryBg: '#2a0f1a',
                secondaryBg: '#3d1a2e',
                cardBg: 'rgba(255, 105, 180, 0.15)',
                inputBg: 'rgba(255, 105, 180, 0.2)',
                gradientStart: '#2a0f1a',
                gradientMiddle: '#3d1a2e',
                gradientEnd: '#4a1636',
                displayGradient: 'linear-gradient(135deg, #2a0f1a, #3d1a2e)'
            },
            galaxyPurple: {
                primaryBg: '#1a0f2a',
                secondaryBg: '#2a1a3e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f2a',
                gradientMiddle: '#2a1a3e',
                gradientEnd: '#3e1650',
                displayGradient: 'linear-gradient(135deg, #1a0f2a, #2a1a3e)'
            },
            icedCoffeeBrown: {
                primaryBg: '#1a1510',
                secondaryBg: '#2a2520',
                cardBg: 'rgba(210, 180, 140, 0.15)',
                inputBg: 'rgba(210, 180, 140, 0.2)',
                gradientStart: '#1a1510',
                gradientMiddle: '#2a2520',
                gradientEnd: '#3a3028',
                displayGradient: 'linear-gradient(135deg, #1a1510, #2a2520)'
            },
            matchaGreen: {
                primaryBg: '#0f1a10',
                secondaryBg: '#1a2a1e',
                cardBg: 'rgba(128, 200, 128, 0.15)',
                inputBg: 'rgba(128, 200, 128, 0.2)',
                gradientStart: '#0f1a10',
                gradientMiddle: '#1a2a1e',
                gradientEnd: '#1e3a28',
                displayGradient: 'linear-gradient(135deg, #0f1a10, #1a2a1e)'
            }
        };

        // tab cloaker presets
        const cloakerPresets = {
            'google-classroom': {
                title: 'Home',
                icon: 'https://ssl.gstatic.com/classroom/favicon.png'
            },
            'ixl': {
                title: 'IXL | Math, Language Arts, Science, Social Studies, and Spanish',
                icon: 'https://www.ixl.com/favicon.ico'
            },
            'deltamath': {
                title: 'DeltaMath',
                icon: 'https://www.deltamath.com/favicon.ico'
            },
            'canvas': {
                title: 'Dashboard',
                icon: 'https://du11hjcvx0uqb.cloudfront.net/br/dist/images/favicon-e10d657a73.ico'
            },
            'schoology': {
                title: 'Home | Schoology',
                icon: 'https://asset.schoology.com/sites/all/themes/schoology_theme/favicon.ico'
            }
        };

        // populate theme grid
        function populateThemes() {
            const grid = document.getElementById('themeGrid');
            if (!grid) return;

            const themeNames = {
                default: 'Default',
                midnightBlue: 'Midnight Blue',
                hotPink: 'Hot Pink',
                galaxyPurple: 'Galaxy Purple',
                icedCoffeeBrown: 'Iced Coffee Brown',
                matchaGreen: 'Matcha Green'
            };

            grid.innerHTML = Object.keys(themes).map(themeKey => `
                <div class="theme-btn ${localStorage.getItem('atticTheme') === themeKey ? 'active' : ''}" 
                     data-theme="${themeKey}" 
                     data-name="${themeNames[themeKey]}"
                     style="background: ${themes[themeKey].displayGradient}">
                </div>
            `).join('');

            // add click handlers
            grid.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const theme = btn.dataset.theme;
                    applytheme(theme);
                    grid.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('atticTheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            localStorage.setItem('atticTheme', themeName);
        }

        // tab cloaker functionality
        function setupTabCloaker() {
            const presetSelect = document.getElementById('presetSelect');
            const customTitle = document.getElementById('customTitle');
            const customIcon = document.getElementById('customIcon');
            const applyBtn = document.getElementById('applyCloak');
            const resetBtn = document.getElementById('resetCloak');

            // preset selection
            presetSelect?.addEventListener('change', () => {
                const preset = cloakerPresets[presetSelect.value];
                if (preset) {
                    customTitle.value = preset.title;
                    customIcon.value = preset.icon;
                }
            });

            // apply cloaker
            applyBtn?.addEventListener('click', () => {
                if (customTitle.value) {
                    document.title = customTitle.value;
                }
                if (customIcon.value) {
                    const favicon = document.querySelector('link[rel="icon"]');
                    if (favicon) {
                        favicon.href = customIcon.value;
                    }
                }
                alert('Tab cloaker applied!');
            });

            // reset cloaker
            resetBtn?.addEventListener('click', () => {
                document.title = 'The Attic | Settings';
                const favicon = document.querySelector('link[rel="icon"]');
                if (favicon) {
                    favicon.href = '/img/TheAtticIcon.png';
                }
                presetSelect.value = '';
                customTitle.value = '';
                customIcon.value = '';
                alert('Tab cloaker reset!');
            });
        }

        // initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            populateThemes();
            setupTabCloaker();
        });
    </script>
</body>
</html>
