<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(200, 200, 200, 0.15);
            --shadow-color: rgba(255, 255, 255, 0.15);
            --gradient-start: #000000;
            --gradient-middle: #1a1a1a;
            --gradient-end: #000000;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            z-index: -2;
            transition: background 0.5s ease;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* particle background */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: moveRight 20s linear infinite;
        }

        @keyframes moveRight {
            0% {
                transform: translateX(-100px);
            }
            100% {
                transform: translateX(calc(100vw + 100px));
            }
        }

        /* intro page */
        .intro-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-middle) 50%, var(--gradient-end) 100%);
            transition: opacity 0.5s ease;
        }

        .intro-logo {
            width: 200px;
            height: 200px;
            object-fit: contain;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .intro-logo.show {
            opacity: 1;
        }

        .intro-page.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* main container */
        .main-container {
            display: none;
            min-height: 100vh;
        }

        .main-container.show {
            display: block;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* page content */
        .page {
            padding-left: 110px;
            padding-right: 20px;
            padding-top: 20px;
            padding-bottom: 20px;
        }

        /* welcome section */
        .welcome-section {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .welcome-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .nickname-input {
            width: 300px;
            padding: 15px 25px;
            background: var(--input-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .nickname-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* trending section */
        .section-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            padding-left: 10px;
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }

        .trending-section {
            margin-bottom: 60px;
        }

        .trending-carousel {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
        }

        .trending-slides {
            display: flex;
            transition: transform 0.5s ease;
        }

        .trending-slide {
            min-width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
        }

        .trending-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .trending-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        }

        .trending-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .trending-description {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .carousel-nav:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .carousel-nav.prev {
            left: 20px;
        }

        .carousel-nav.next {
            right: 20px;
        }

        /* game sections */
        .game-section {
            margin-bottom: 60px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 10px 0;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            position: relative;
            aspect-ratio: 4/3;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .game-card:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .game-card-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 15px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            transform: translateY(20px);
            transition: all 0.4s ease;
            opacity: 0;
        }

        .game-card:hover .game-card-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .game-card-title {
            font-size: 1rem;
            font-weight: 600;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-tags {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .game-tag {
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* glow effect */
        .game-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3));
            border-radius: 22px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }

        .game-card:hover::before {
            opacity: 1;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
                z-index: 200;
            }

            .page {
                padding-left: 20px;
                padding-right: 20px;
                padding-bottom: 100px;
            }

            .welcome-title {
                font-size: 2rem;
            }

            .welcome-subtitle {
                font-size: 1rem;
            }

            .nickname-input {
                width: 100%;
                max-width: 300px;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }

            .trending-slide {
                height: 250px;
            }

            .trending-title {
                font-size: 1.5rem;
            }

            .trending-description {
                font-size: 0.9rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .carousel-nav {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding-left: 15px;
                padding-right: 15px;
            }

            .welcome-title {
                font-size: 1.5rem;
            }

            .welcome-subtitle {
                font-size: 0.9rem;
            }

            .nickname-input {
                padding: 12px 20px;
                font-size: 0.9rem;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }

            .game-card-title {
                font-size: 0.85rem;
            }

            .game-tag {
                font-size: 0.6rem;
                padding: 2px 6px;
            }

            .trending-slide {
                height: 200px;
            }

            .trending-title {
                font-size: 1.2rem;
            }

            .trending-description {
                font-size: 0.8rem;
            }

            .section-title {
                font-size: 1.3rem;
            }

            .sidebar {
                gap: 15px;
                padding: 15px 0;
            }

            .sidebar-icon {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
        }
    </style>

            { id: 'princess-spa', name: 'Princess Spa', img: 'https://via.placeholder.com/200x150/607D8B/ffffff?text=Princess+Spa', category: 'beauty', tags: ['spa', 'relax'] },
            { id: 'wedding-dress', name: 'Wedding Dress', img: 'https://via.placeholder.com/200x150/F44336/ffffff?text=Wedding+Dress', category: 'beauty', tags: ['wedding', 'dress-up'] },
            { id: 'beauty-contest', name: 'Beauty Contest', img: 'https://via.placeholder.com/200x150/00BCD4/ffffff?text=Beauty+Contest', category: 'beauty', tags: ['contest', 'style'] }
        ];

        // theme definitions
        const themes = {
            default: {
                primaryBg: '#000000',
                secondaryBg: '#1a1a1a',
                cardBg: 'rgba(255, 255, 255, 0.1)',
                inputBg: 'rgba(200, 200, 200, 0.15)',
                gradientStart: '#000000',
                gradientMiddle: '#1a1a1a',
                gradientEnd: '#000000'
            },
            midnightBlue: {
                primaryBg: '#0a1628',
                secondaryBg: '#1a2a4a',
                cardBg: 'rgba(100, 149, 237, 0.15)',
                inputBg: 'rgba(100, 149, 237, 0.2)',
                gradientStart: '#0a1628',
                gradientMiddle: '#1a2a4a',
                gradientEnd: '#0f2847'
            },
            hotPink: {
                primaryBg: '#2a0f1a',
                secondaryBg: '#3d1a2e',
                cardBg: 'rgba(255, 105, 180, 0.15)',
                inputBg: 'rgba(255, 105, 180, 0.2)',
                gradientStart: '#2a0f1a',
                gradientMiddle: '#3d1a2e',
                gradientEnd: '#4a1636'
            },
            galaxyPurple: {
                primaryBg: '#1a0f2a',
                secondaryBg: '#2a1a3e',
                cardBg: 'rgba(147, 112, 219, 0.15)',
                inputBg: 'rgba(147, 112, 219, 0.2)',
                gradientStart: '#1a0f2a',
                gradientMiddle: '#2a1a3e',
                gradientEnd: '#3e1650'
            },
            icedCoffeeBrown: {
                primaryBg: '#1a1510',
                secondaryBg: '#2a2520',
                cardBg: 'rgba(210, 180, 140, 0.15)',
                inputBg: 'rgba(210, 180, 140, 0.2)',
                gradientStart: '#1a1510',
                gradientMiddle: '#2a2520',
                gradientEnd: '#3a3028'
            },
            matchaGreen: {
                primaryBg: '#0f1a10',
                secondaryBg: '#1a2a1e',
                cardBg: 'rgba(128, 200, 128, 0.15)',
                inputBg: 'rgba(128, 200, 128, 0.2)',
                gradientStart: '#0f1a10',
                gradientMiddle: '#1a2a1e',
                gradientEnd: '#1e3a28'
            }
        };

        let currentSlide = 0;

        // initialize carousel
        function initCarousel() {
            const slidesContainer = document.getElementById('trendingSlides');
            slidesContainer.innerHTML = trendingSlides.map(slide => `
                <div class="trending-slide">
                    <a href="${slide.link}">
                        <img src="${slide.img}" alt="${slide.title}">
                        <div class="trending-overlay">
                            <h3 class="trending-title">${slide.title}</h3>
                            <p class="trending-description">${slide.desc}</p>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        function updateCarousel() {
            const slidesContainer = document.getElementById('trendingSlides');
            slidesContainer.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % trendingSlides.length;
            updateCarousel();
        }

        function prevSlide() {
            currentSlide = (currentSlide - 1 + trendingSlides.length) % trendingSlides.length;
            updateCarousel();
        }

        // populate game grids
        function populateGames() {
            const categories = {
                popular: 'popularGames',
                action: 'actionGames',
                horror: 'horrorGames',
                running: 'runningGames',
                beauty: 'beautyGames'
            };

            Object.keys(categories).forEach(category => {
                const container = document.getElementById(categories[category]);
                if (!container) return;

                const categoryGames = games.filter(game => {
                    const gameCats = Array.isArray(game.category) ? game.category : [game.category];
                    return gameCats.includes(category);
                });

                container.innerHTML = categoryGames.map(game => `
                    <a href="/theattic/play/${game.id}.html" class="game-card">
                        <img src="${game.img}" alt="${game.name}">
                        <div class="game-card-overlay">
                            <div class="game-card-title">${game.name}</div>
                            <div class="game-tags">
                                ${game.tags.slice(0, 2).map(tag => `<span class="game-tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    </a>
                `).join('');
            });
        }

        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localStorage.getItem('atticTheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;

            const root = document.documentElement;
            
            root.style.setProperty('--primary-bg', theme.primaryBg);
            root.style.setProperty('--secondary-bg', theme.secondaryBg);
            root.style.setProperty('--card-bg', theme.cardBg);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--gradient-start', theme.gradientStart);
            root.style.setProperty('--gradient-middle', theme.gradientMiddle);
            root.style.setProperty('--gradient-end', theme.gradientEnd);

            localStorage.setItem('atticTheme', themeName);
        }

        // initialize particles
        function createparticles() {
            const particlescontainer = document.getElementById('particles');
            if (!particlescontainer) return;
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlescontainer.appendChild(particle);
            }
        }

        // mouse shadow follower
        document.addEventListener('mousemove', (e) => {
            const shadow = document.getElementById('mouseShadow');
            if (shadow) {
                shadow.style.left = e.clientX + 'px';
                shadow.style.top = e.clientY + 'px';
            }
        });

        // intro animation
        function playIntro() {
            const introPage = document.getElementById('introPage');
            const introLogo = document.getElementById('introLogo');
            const mainContainer = document.getElementById('mainContainer');

            setTimeout(() => {
                introLogo.classList.add('show');
            }, 500);

            setTimeout(() => {
                introLogo.classList.remove('show');
            }, 3500);

            setTimeout(() => {
                introPage.classList.add('hidden');
                mainContainer.classList.add('show');
            }, 4500);
        }

        // load nickname
        function loadNickname() {
            const savedNickname = localStorage.getItem('atticNickname');
            if (savedNickname) {
                const input = document.getElementById('nicknameInput');
                if (input) {
                    input.value = savedNickname;
                }
            }
        }

        // save nickname
        function saveNickname() {
            const input = document.getElementById('nicknameInput');
            if (input) {
                localStorage.setItem('atticNickname', input.value);
            }
        }

        document.getElementById('nicknameInput')?.addEventListener('change', saveNickname);

        // initialize on load
        window.addEventListener('load', () => {
            applysavedtheme();
            createparticles();
            initCarousel();
            populateGames();
            loadNickname();
            playIntro();
        });

        // auto-rotate carousel
        setInterval(nextSlide, 5000);
    </script>
</body>
</html>
