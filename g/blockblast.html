<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>veinte - play</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        :root {
            --primary-bg: #000000;
            --secondary-bg: #1a1a1a;
            --text-color: #ffffff;
            --sidebar-bg: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--primary-bg);
            color: var(--text-color);
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* grainy gradient background */
        .grainy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 50%, var(--primary-bg) 100%);
            z-index: -2;
        }

        .grainy-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
        }

        /* mouse shadow follower */
        .mouse-shadow {
            position: fixed;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: screen;
        }

        /* main container */
        .play-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px 110px 20px 110px;
            height: calc(100vh - 40px);
            gap: 15px;
        }

        /* sidebar */
        .sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 70px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .sidebar-icon {
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* game frame */
        .game-frame {
            flex: 1;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
        }

        /* game controls */
        .game-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar {
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 10px;
                width: auto;
                height: 70px;
                transform: none;
                flex-direction: row;
                z-index: 200;
            }

            .play-container {
                padding: 20px 20px 90px 20px;
            }

            .game-controls {
                gap: 8px;
            }

            .control-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="grainy-bg"></div>
    <div class="mouse-shadow" id="mouseShadow"></div>

    <!-- main container -->
    <div class="play-container">
        <!-- sidebar -->
        <nav class="sidebar">
            <a href="index.html" class="sidebar-icon" title="home">
                <i class="fas fa-home"></i>
            </a>
            <a href="g.html" class="sidebar-icon" title="games">
                <i class="fas fa-gamepad"></i>
            </a>
            <a href="p.html" class="sidebar-icon" title="proxy">
                <i class="fas fa-search"></i>
            </a>
            <a href="t.html" class="sidebar-icon" title="tools">
                <i class="fas fa-tools"></i>
            </a>
            <a href="s.html" class="sidebar-icon" title="settings">
                <i class="fas fa-cog"></i>
            </a>
        </nav>

        <div class="game-frame">
            <iframe id="gameFrame" src="about:blank"></iframe>
        </div>
        <div class="game-controls">
            <button class="control-btn" onclick="likegame()">
                <i class="fas fa-thumbs-up"></i> like
            </button>
            <button class="control-btn" onclick="dislikegame()">
                <i class="fas fa-thumbs-down"></i> dislike
            </button>
            <button class="control-btn" onclick="togglefullscreen()">
                <i class="fas fa-expand"></i> fullscreen
            </button>
            <button class="control-btn" onclick="openinnewtab()">
                <i class="fas fa-external-link-alt"></i> new tab
            </button>
            <button class="control-btn" onclick="refreshgame()">
                <i class="fas fa-sync"></i> refresh
            </button>
            <button class="control-btn" id="downloadBtn" onclick="downloadgame()">
                <i class="fas fa-download"></i> download
            </button>
        </div>
    </div>

    <script>
        // apply saved theme
        function applysavedtheme() {
            const savedtheme = localstorage.getitem('veintetheme');
            if (savedtheme) {
                applytheme(savedtheme);
            }
        }

        function applytheme(theme) {
            const root = document.documentelement;
            
            const themes = {
                default: {
                    primaryBg: '#000000',
                    secondaryBg: '#1a1a1a',
                    cardBg: 'rgba(255, 255, 255, 0.1)'
                },
                blue: {
                    primaryBg: '#1a1a2e',
                    secondaryBg: '#16213e',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                pink: {
                    primaryBg: '#2d1a2e',
                    secondaryBg: '#3e1621',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                green: {
                    primaryBg: '#1a2e1a',
                    secondaryBg: '#163e1c',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                },
                brown: {
                    primaryBg: '#2e2a1a',
                    secondaryBg: '#3e3616',
                    cardBg: 'rgba(255, 255, 255, 0.08)'
                }
            };

            const selectedtheme = themes[theme];
            root.style.setproperty('--primary-bg', selectedtheme.primaryBg);
            root.style.setproperty('--secondary-bg', selectedtheme.secondaryBg);
            root.style.setproperty('--card-bg', selectedtheme.cardBg);
        }

        // get game/tool from url
        function getcontentfromurl() {
            const urlparams = new urlsearchparams(window.location.search);
            const gameid = urlparams.get('game');
            const toolid = urlparams.get('tool');
            
            if (gameid) {
                currentcontent = gameid;
                isgame = true;
                document.getelementbyid('gameframe').src = 'about:blank';
                document.getelementbyid('downloadbtn').style.display = 'flex';
            } else if (toolid) {
                currentcontent = toolid;
                isgame = false;
                document.getelementbyid('gameframe').src = 'about:blank';
                document.getelementbyid('downloadbtn').style.display = 'none';
            } else {
                window.location.href = 'index.html';
            }
        }

        let currentcontent = null;
        let isgame = false;

        // game controls
        function likegame() {
            // silent like - no popup
        }

        function dislikegame() {
            // silent dislike - no popup
        }

        function togglefullscreen() {
            const iframe = document.getelementbyid('gameframe');
            if (iframe.requestfullscreen) {
                iframe.requestfullscreen();
            } else if (iframe.webkitrequestfullscreen) {
                iframe.webkitrequestfullscreen();
            }
        }

        function openinnewtab() {
            const url = isgame ? `games/${currentcontent}.html` : `tools/${currentcontent}.html`;
            window.open(url, '_blank');
        }

        function refreshgame() {
            document.getelementbyid('gameframe').src = document.getelementbyid('gameframe').src;
        }

        function downloadgame() {
            if (isgame && currentcontent) {
                // silent download - no popup
                // in real implementation, this would download the game html
            }
        }

        // mouse shadow follower
        document.addeventlistener('mousemove', (e) => {
            const shadow = document.getelementbyid('mouseshadow');
            shadow.style.left = e.clientx + 'px';
            shadow.style.top = e.clienty + 'px';
        });

        // initialize on load
        window.addeventlistener('load', () => {
            applysavedtheme();
            getcontentfromurl();
        });
    </script>
</body>
</html>
